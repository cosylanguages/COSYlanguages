name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Inject Supabase config
        run: |
          cat > js/config.js << 'CONFIGEOF'
          window.COSY_SUPABASE_URL = '${{ secrets.COSY_SUPABASE_URL }}';
          window.COSY_SUPABASE_ANON_KEY = '${{ secrets.COSY_SUPABASE_ANON_KEY }}';
          CONFIGEOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
          exclude_assets: '.github,node_modules'
