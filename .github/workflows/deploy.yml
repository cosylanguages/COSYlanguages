name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: write
      pages: write
      id-token: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Inject Supabase config
        run: |
          cat > js/config.js << 'CONFIGEOF'
          window.COSY_SUPABASE_URL = '${{ secrets.COSY_SUPABASE_URL }}';
          window.COSY_SUPABASE_ANON_KEY = '${{ secrets.COSY_SUPABASE_ANON_KEY }}';
          CONFIGEOF

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
