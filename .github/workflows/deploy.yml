name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Generate Config
        run: |
          cp js/config.template.js js/config.js
          sed -i "s|window.COSY_SUPABASE_URL = ''|window.COSY_SUPABASE_URL = '${{ secrets.COSY_SUPABASE_URL }}'|g" js/config.js
          sed -i "s|window.COSY_SUPABASE_ANON_KEY = ''|window.COSY_SUPABASE_ANON_KEY = '${{ secrets.COSY_SUPABASE_ANON_KEY }}'|g" js/config.js
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
