<!DOCTYPE html>
<html lang="xx">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson Title — COSYlanguages</title>
<link rel="icon" href="../../../images/logos/cosylanguages.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Lora:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../../css/tokens.css">
<link rel="stylesheet" href="../../../css/base.css">
<link rel="stylesheet" href="../../../css/components.css">
<link rel="stylesheet" href="../../../css/layout.css">
</head>
<body class="grammar-body">

<div class="grammar-header-new">
  <div>
    <div class="breadcrumb">Student Area 🔐</div>
    <h1>Lesson Title</h1>
  </div>
  <a href="../xx.html" class="lang-tab active">← Roadmap</a>
</div>

<div class="grammar-layout">
<nav class="grammar-sidebar">
  <a class="gs-item active" href="#rules">Rules</a>
  <a class="gs-item" href="#quiz">Quiz</a>
  <div class="gs-label" id="nav-label">Navigation</div>
  <a class="gs-item" href="../xx.html">← Roadmap</a>
</nav>

<main class="grammar-main">
  <div class="level-section" id="rules">
    <div class="g-card">
      <div class="g-card-title">Grammar Concept Title</div>
      <p class="g-desc">Explanation in the target language.</p>
      <table class="gtable">
        <tr class="section-row"><td colspan="3">Category Name</td></tr>
        <tr>
          <td class="row-label">Feature</td>
          <td class="content"><span class="key-verb">form</span></td>
          <td class="content">Example sentence.</td>
        </tr>
      </table>
    </div>
  </div>

  <div class="g-quiz-card" id="quiz">
    <div class="g-card-title">Interactive Quiz</div>
    <div class="g-quiz-body">
      <div class="g-quiz-q" id="q1">
        <div class="g-quiz-prompt">Question prompt here ___ ?</div>
        <div class="g-quiz-options">
          <button class="g-quiz-opt" onclick="answer(this,'q1','option1')">Option 1</button>
          <button class="g-quiz-opt" onclick="answer(this,'q1','option2')">Option 2</button>
        </div>
        <div class="quiz-feedback" id="fb-q1"></div>
      </div>
    </div>
  </div>
</main>
</div>

<script>
const answers = { q1: 'option1' };
function answer(btn, qid, chosen) {
  const correct = answers[qid];
  const fb = document.getElementById('fb-' + qid);
  if (chosen === correct) {
    btn.classList.add('correct');
    fb.textContent = 'Correct! ✅';
  } else {
    btn.classList.add('wrong');
    fb.textContent = 'Try again! ❌';
  }
}
</script>
</body>
</html>
