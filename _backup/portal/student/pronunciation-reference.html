<!DOCTYPE html>
<html lang="en">
<head>
<script>if(localStorage.getItem("student_unlocked")!=="true")window.location.href="../index.html";</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronunciation Engine — COSYlanguages</title>
<link rel="icon" href="../../images/logos/cosylanguages.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Lora:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<script src="../../js/data/curriculum_data.js"></script>
<script src="../../js/core/i18n.js"></script>
<script src="../../js/core/engine.js"></script>
<script src="../../js/games/utils/shared.js"></script>

<link rel="stylesheet" href="../../css/tokens.css">
<link rel="stylesheet" href="../../css/base.css">
<link rel="stylesheet" href="../../css/components.css">
<link rel="stylesheet" href="../../css/layout.css">
<link rel="stylesheet" href="../../css/portal.css">
</head>
<body>

<nav id="cosy-nav"></nav>

<div class="page-header">
  <div>
    <a href="index.html" style="text-decoration: none; color: inherit;"><div class="breadcrumb">Student Area 🔑</div></a>
    <h1>Pronunciation Reference 🔊</h1>
  </div>
  <div class="lang-tabs" id="lang-tabs">
    <!-- Buttons filled from curriculum_data.js -->
  </div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main-content">
    <div id="engine-status" style="text-align:center; padding: 3rem; font-weight: 800; opacity: 0.5;" data-translate-key="loading_engine">
      Loading Pronunciation Engine...
    </div>
  </main>
</div>

<script>
let currentLang = 'en';
let currentCurriculum = [];

async function init() {
  const savedTheme = localStorage.getItem('cosy_dashboard_theme') || 'earth';
  document.body.className = 'theme-' + savedTheme;

  const code = localStorage.getItem('student_course_code');
  let startLang = 'en';

  if (code && typeof COURSES !== 'undefined' && COURSES[code]) {
    startLang = COURSES[code].lang.toLowerCase();
    document.getElementById('lang-tabs').style.display = 'none';
  }

  // Load translations
  await loadLanguageFile('en');
  if (startLang !== 'en') await loadLanguageFile(startLang);

  // Build tabs if visible
  const tabCont = document.getElementById('lang-tabs');
  if (tabCont.style.display !== 'none') {
    Object.entries(LANGS).forEach(([id, info]) => {
      const btn = document.createElement('button');
      btn.className = 'lang-tab' + (id.toLowerCase() === startLang ? ' active' : '');
      btn.textContent = `${info.flag} ${id}`;
      btn.onclick = () => setLang(id.toLowerCase());
      btn.dataset.lang = id.toLowerCase();
      tabCont.appendChild(btn);
    });
  }

  setLang(startLang);
}

async function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === lang));

  const status = document.getElementById('engine-status');
  if (status) status.style.display = 'block';

  try {
    await loadData(lang);
    renderContent();
  } catch (e) {
    console.error('Error in setLang:', e);
  }
}

async function loadData(lang) {
  const dataKey = `${lang.toLowerCase()}_a1`;
  const prefix = (window.COSY && window.COSY.getPrefix) ? window.COSY.getPrefix() : '../../';
  const path = `${prefix}js/data/curriculum/${dataKey}.js`;

  return new Promise((resolve) => {
    const script = document.createElement('script');
    script.src = path;
    script.onload = () => {
      if (window.curriculumData && window.curriculumData[dataKey]) {
        currentCurriculum = window.curriculumData[dataKey];
      }
      resolve();
    };
    script.onerror = () => {
      console.warn(`Curriculum not found for ${dataKey}`);
      currentCurriculum = [];
      resolve();
    };
    document.head.appendChild(script);
  });
}

function renderContent() {
  const main = document.getElementById('main-content');
  const sidebar = document.getElementById('sidebar');

  let allPoints = [];
  currentCurriculum.forEach(unit => {
    (unit.lessons || []).forEach(lesson => {
      if (lesson.pronunciation) {
        lesson.pronunciation.forEach(p => {
          allPoints.push({ ...p, lessonTitle: lesson.title });
        });
      }
    });
  });

  if (allPoints.length === 0) {
    main.innerHTML = `<div class="section-title">${LANGS[currentLang.toUpperCase()]?.label || currentLang} Pronunciation</div>
                      <p style="text-align:center; padding: 2rem;">No pronunciation data found for this level yet.</p>`;
    sidebar.innerHTML = "";
    return;
  }

  // Render Sidebar
  sidebar.innerHTML = `<div class="sidebar-section">
    <div class="sidebar-label">A1 Topics</div>
    ${allPoints.map((p, i) => `
      <a class="sidebar-item" href="#point-${i}" id="side-item-${i}" onclick="scrollToPoint(event, ${i})">${p.point}</a>
    `).join('')}
  </div>`;

  // Render Main
  main.innerHTML = `<div class="section-title">${LANGS[currentLang.toUpperCase()]?.label} — A1 Pronunciation</div>`;

  // Master Summary Table
  const summaryCard = document.createElement('div');
  summaryCard.className = 'card';
  summaryCard.style.background = 'var(--cream)';

  const masterTitle = window.t('master_ipa_summary', currentLang);
  const masterDesc = window.t('master_ipa_desc', currentLang);

  let summaryHtml = `
    <div class="card-title" style="background:var(--sienna, #8B5E3C)">📊 ${masterTitle}</div>
    <div class="card-body">
      <p style="margin-bottom: 1rem; font-size: 0.85rem; opacity: 0.8;">${masterDesc}</p>
      <div class="alpha-grid" style="grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));">
  `;

  const uniqueIpas = new Map();
  allPoints.forEach(p => {
    if (p.alphabet) p.alphabet.forEach(a => { if(!uniqueIpas.has(a.ipa)) uniqueIpas.set(a.ipa, a.l); });
    if (p.examples) p.examples.forEach(ex => { if(!uniqueIpas.has(ex.ipa)) uniqueIpas.set(ex.ipa, ex.word); });
    if (p.minimalPairs) p.minimalPairs.forEach(mp => {
        if(!uniqueIpas.has(mp.p1)) uniqueIpas.set(mp.p1, mp.w1);
        if(!uniqueIpas.has(mp.p2)) uniqueIpas.set(mp.p2, mp.w2);
    });
  });

  uniqueIpas.forEach((example, ipa) => {
    summaryHtml += `
      <div class="alpha-cell" style="min-height: 60px;" onclick="speakPhonetic('${example.replace(/'/g, "\\'")}')">
        <div class="ipa-sm" style="font-size: 1.1rem; color: var(--sienna, #8B5E3C); font-weight: 800;">${ipa}</div>
        <div style="font-size: 0.65rem; opacity: 0.6;">${example}</div>
      </div>
    `;
  });

  summaryHtml += `</div></div>`;
  summaryCard.innerHTML = summaryHtml;
  main.appendChild(summaryCard);

  allPoints.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `point-${i}`;

    let html = `
      <div class="card-title">${p.visual || '🔊'} ${p.point}</div>
      <div class="card-body">
        <p style="margin-bottom: 1rem; line-height: 1.5;">${p.explain}</p>
        ${p.image ? `<img src="${p.image}" alt="${p.point}" style="max-width:100%; border-radius:12px; margin-bottom:1rem; border:2px solid var(--border);">` : ''}
    `;

    if (p.alphabet) {
      html += `<div class="alpha-grid">
        ${p.alphabet.map(a => `
          <div class="alpha-cell" onclick="speakPhonetic('${a.l.replace(/'/g, "\\'")}')">
            <div class="letter">${a.l}</div>
            <div class="ipa-sm">${a.ipa}</div>
          </div>
        `).join('')}
      </div>`;
    }

    if (p.minimalPairs) {
      html += `<table class="gtable">
        <thead><tr><th>Word 1</th><th>IPA</th><th>Word 2</th><th>IPA</th></tr></thead>
        <tbody>
          ${p.minimalPairs.map(mp => `
            <tr>
              <td class="ex" onclick="speakPhonetic('${mp.w1.replace(/'/g, "\\'")}')">${mp.w1}</td>
              <td class="ipa">${mp.p1}</td>
              <td class="ex" onclick="speakPhonetic('${mp.w2.replace(/'/g, "\\'")}')">${mp.w2}</td>
              <td class="ipa">${mp.p2}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
    }

    if (p.examples) {
      html += `<table class="gtable">
        <thead><tr><th>Pattern</th><th>IPA</th><th>Example</th></tr></thead>
        <tbody>
          ${p.examples.map(ex => `
            <tr>
              <td><strong>${ex.pattern}</strong></td>
              <td class="ipa">${ex.ipa}</td>
              <td class="ex" onclick="speakPhonetic('${ex.word.replace(/'/g, "\\'")}')">${ex.word}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
    }

    if (p.tip) {
      html += `<div class="tip-box">💡 <strong>Tip:</strong> ${p.tip}</div>`;
    }

    if (p.extension) {
      html += `<div class="extension-box">${p.extension}</div>`;
    }

    html += `
        <div style="margin-top: 1.5rem; display: flex; justify-content: flex-end;">
          <a href="../../practice/index.html?lang=${currentLang}&cat=pronunciation&theme=${encodeURIComponent(p.point)}" class="btn-practice">
            🎯 Practice these sounds
          </a>
        </div>
      </div>
    `;

    card.innerHTML = html;
    main.appendChild(card);
  });

  initScrollSpy();
}

function speakPhonetic(text) {
  if (window.gameUtils && window.gameUtils.speak) {
    window.gameUtils.speak(text, currentLang, 0.7);
  } else if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = currentLang;
    utterance.rate = 0.7;
    window.speechSynthesis.speak(utterance);
  }
}

function scrollToPoint(e, i) {
  if (e) e.preventDefault();
  const el = document.getElementById(`point-${i}`);
  if (el) {
    const offset = 80;
    const bodyRect = document.body.getBoundingClientRect().top;
    const elementRect = el.getBoundingClientRect().top;
    const elementPosition = elementRect - bodyRect;
    const offsetPosition = elementPosition - offset;

    window.scrollTo({
      top: offsetPosition,
      behavior: 'smooth'
    });
  }
}

function initScrollSpy() {
  const options = { rootMargin: '-100px 0px -70% 0px', threshold: 0 };
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        const id = entry.target.id.split('-')[1];
        const item = document.getElementById(`side-item-${id}`);
        if (item) item.classList.add('active');
      }
    });
  }, options);

  document.querySelectorAll('.card').forEach(card => observer.observe(card));
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
