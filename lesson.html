            <li><a href="days.html" class="nav-student" data-translate-key="nav_my_lessons">My Lessons 🔐</a></li>

            <a data-lang="en">EN</a><a data-lang="fr">FR</a><a data-lang="it">IT</a><a data-lang="ru">RU</a><a data-lang="el">EL</a>
        </div>
    </nav>

    <main class="practice-main">
        <section id="practice-container">
            <header class="practice-header" style="padding-top: 2rem; padding-bottom: 2rem;">
                <h2 data-translate-key="curriculum_title">Days Curriculum 🗓️</h2>
            </header>

            <div id="practice-section">
                <div id="practice-progress" class="progress-bar-container">
                    <div id="progress-fill" class="progress-fill"></div>
                </div>
                <div id="progress-text"></div>

                <div id="question-card" class="event-item glass">
                    <div id="lesson-info" class="lesson-badge"></div>
                    <div id="emoji-display" class="practice-emoji"></div>
                    <div id="task-instruction" class="sec-tag"></div>
                    <div id="task-what-to-do" class="what-to-do-box" style="display: none;"></div>
                    <div id="task-example" class="subtext-display" style="display: none; margin-bottom: 1.5rem;"></div>

                    <div class="word-container">
                        <div id="word-display" class="word-text"></div>
                        <div id="subtext-display" class="subtext-display"></div>
                        <button id="listen-btn" class="cta-button secondary" style="padding: .4rem 1rem; font-size: .8rem; margin-top: .5rem;" data-translate-key="listen_btn">Listen 🔊</button>
                    </div>

                    <div id="answer-area">
                        <div id="opposite-input-container" style="display: none;"><input type="text" id="opposite-answer" class="app-input" data-translate-key="placeholder_type_here" placeholder="..."></div>
                        <div id="action-buttons-container" style="display: none; justify-content: center; gap: 1rem; margin-bottom: 1rem;"><button id="check-opposite-btn" class="cta-button primary">Check</button></div>
                        <div id="choices-grid" class="choices-grid"></div>
                        <div id="scramble-container" style="display: none;"><div id="word-assembly" class="word-assembly"></div><div id="scramble-letters" class="choices-grid"></div><button id="clear-scramble-btn" class="cta-button secondary" style="margin-top: 1rem;">Clear</button></div>
                        <div id="tf-buttons-container" style="display: none; justify-content: center; gap: 1rem;"><button id="true-btn" class="cta-button primary">True</button><button id="false-btn" class="cta-button primary" style="background: #f44336;">False</button></div>
                        <div id="conversation-container" style="display: none;"><textarea id="conversation-response" class="pill-input" style="height: 100px; margin-bottom: 1rem;"></textarea><button id="finish-conversation-btn" class="cta-button primary">Done</button></div>
                    </div>

                    <div id="feedback-message" class="feedback-text"></div>

                    <div style="display: flex; gap: 1rem; justify-content: center;">
                        <button id="hint-btn" class="cta-button secondary" data-translate-key="hint_btn">Hint 💡</button>
                        <button id="next-btn" class="cta-button primary" style="display: none;" data-translate-key="next_word">Next Word ➡️</button>
                    </div>
                </div>

                <div class="practice-footer" style="display: flex; justify-content: center; gap: 2rem; margin-top: 2rem;">
                    <div><span data-translate-key="score_label">COSY Points: ✨</span> <span id="score-count">0</span></div>
                </div>
                <div style="text-align: center; margin-top: 3rem;">
                    <button id="exit-lesson-btn" class="cta-button secondary" data-translate-key="exit_btn">Exit Lesson 🏠</button>
                </div>
            </div>
        </section>
    </main>

    <div id="summary-modal" class="modal-overlay">
        <div class="modal-content glass">
            <h2 data-translate-key="session_summary_title">Lesson Summary 🎉</h2>
            <div class="summary-stats">
                <div class="stat-item">
                    <p data-translate-key="session_points">Lesson Points</p>
                    <span id="final-score" class="stat-value">0</span>
                    <span class="stat-emoji">✨</span>
                </div>
            </div>
            <button id="back-to-menu-btn" class="cta-button primary" data-translate-key="back_to_menu" style="width: 100%;">Back to Menu 🏠</button>
        </div>
    </div>

    <footer>
        <div class="footer-inner">
            <div class="footer-bottom">© 2025 COSYlanguages — All rights reserved</div>
        </div>
    </footer>

    <script src="js/data/romance/es/translations.js"></script>
    <script src="js/data/germanic/de/translations.js"></script>

    <script src="js/translate.js"></script>
    <script src="js/script.js"></script>

    <script src="js/lesson.js"></script>
</body>
