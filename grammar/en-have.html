<div class="grammar-layout">
<nav class="grammar-sidebar">
  <a class="gs-item active" href="#present">Present Simple</a>
  <a class="gs-item" href="#quiz">Interactive Quiz</a>

<main class="grammar-main">
  <div class="grammar-section-title">English — Verb TO HAVE</div>
  <div class="g-card" id="present">
    <div class="g-card-title">Present Simple Forms</div>
    <table class="g-table">
      <tr class="section-row"><td colspan="3">Affirmative</td></tr>
      <tr><td class="row-label">I/You/We/They</td><td class="content"><span class="key-verb">have</span></td><td>I have a dog.</td></tr>
      <tr><td class="row-label">He/She/It</td><td class="content"><span class="key-verb">has</span></td><td>She has a car.</td></tr>
    </table>
  </div>

  <div class="g-quiz-card" id="quiz">
    <div class="g-card-title">Interactive Quiz</div>
    <div class="g-quiz-body">
      <div class="g-quiz-q" id="q1"><div class="g-quiz-prompt">We ___ a big house.</div><div class="g-quiz-options"><button class="g-quiz-opt" onclick="answer(this,'q1','have')">have</button><button class="g-quiz-opt" onclick="answer(this,'q1','has')">has</button></div><div class="quiz-feedback" id="fb-q1"></div></div>
      <div class="g-quiz-q" id="q2"><div class="g-quiz-prompt">He ___ two brothers.</div><div class="g-quiz-options"><button class="g-quiz-opt" onclick="answer(this,'q2','has')">has</button><button class="g-quiz-opt" onclick="answer(this,'q2','have')">have</button></div><div class="quiz-feedback" id="fb-q2"></div></div>
    </div>
  </div>
</main>
</div>
<script>
const answers={q1:'have',q2:'has'};
function answer(btn,qid,chosen){
  const correct=answers[qid]; const fb=document.getElementById('fb-'+qid);
  if(chosen===correct){ btn.classList.add('correct'); fb.textContent='Correct!'; }
  else { btn.classList.add('wrong'); fb.textContent='Not quite.'; }
}
</script>
