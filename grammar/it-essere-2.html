<!DOCTYPE html>
<html lang="it">
<head>
<script>if(localStorage.getItem("student_unlocked")!=="true")window.location.href="../days.html";</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESSERE: Plurale — COSYlanguages</title>
<link rel="icon" href="../images/cosylanguages.png">
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="grammar-body">
<nav id="main-nav">
  <a class="nav-logo" href="../index.html"><img src="../images/cosylanguages.png"></a>
  <ul class="nav-links"><li><a href="it.html">🇮🇹 Italian Roadmap</a></li></ul>
</nav>
<div class="grammar-header">
  <h1>🇮🇹 Verbo ESSERE</h1>
</div>
<div class="grammar-layout">
<nav class="grammar-sidebar">
  <a class="gs-item active" href="#present">Plurale</a>
  <a class="gs-item" href="#quiz">Quiz Interattivo</a>
  <a class="gs-item" href="#sentence-builder">Costruttore</a>
  <div class="gs-label">Ritorno</div>
  <a class="gs-item" href="it-essere-1.html">← Singolare</a>
</nav>
<main class="grammar-main">
  <div class="grammar-section-title">Italiano — ESSERE al completo</div>
  <div class="g-card" id="present">
    <div class="g-card-title">Forme Plurali</div>
    <table class="g-table">
      <tr><td class="row-label">noi</td><td class="content"><span class="key-verb">siamo</span></td></tr>
      <tr><td class="row-label">voi</td><td class="content"><span class="key-verb">siete</span></td></tr>
      <tr><td class="row-label">loro</td><td class="content"><span class="key-verb">sono</span></td></tr>
    </table>
  </div>

  <div class="g-quiz-card" id="quiz">
    <div class="g-card-title">Quiz Interattivo</div>
    <div class="g-quiz-body">
      <div class="g-quiz-q" id="q1">
        <div class="g-quiz-prompt">Noi ___ a casa.</div>
        <div class="g-quiz-options">
          <button class="g-quiz-opt" onclick="answer(this,'q1','siamo')">siamo</button>
          <button class="g-quiz-opt" onclick="answer(this,'q1','sono')">sono</button>
        </div>
        <div class="quiz-feedback" id="fb-q1"></div>
      </div>
    </div>
  </div>

  <div class="g-card" id="sentence-builder">
    <div class="g-card-title">Sentence Builder</div>
    <div style="padding: 1.5rem; text-align: center;">
      <p style="margin-bottom: 1rem; color: var(--black); font-weight: 700;">Complete the sentence:</p>
      <div style="font-size: 1.2rem; font-weight: 800; color: var(--black);">
        Noi <input type="text" data-answer="siamo" oninput="checkInput(this)" style="width: 80px; padding: 5px; border: 2px solid var(--black); border-radius: 4px; text-align: center; font-family: inherit;"> pronti.
      </div>
    </div>
  </div>
</main>
</div>
<script>
const answers={q1:'siamo'};
function answer(btn,qid,chosen){
  const correct=answers[qid]; const fb=document.getElementById('fb-'+qid);
  if(chosen===correct){ btn.classList.add('correct'); fb.textContent='Esatto!'; }
  else { btn.classList.add('wrong'); fb.textContent='Non proprio.'; }
}
function checkInput(el) {
  const target = el.getAttribute('data-answer');
  if (el.value.toLowerCase() === target) {
    el.style.backgroundColor = '#2ECC40';
    el.style.color = '#fff';
    el.classList.add('ok');
  } else {
    el.style.backgroundColor = '';
    el.style.color = '';
    el.classList.remove('ok');
  }
}
</script>
<style>input.ok { border-color: #2ECC40 !important; }</style>
</body>
</html>
