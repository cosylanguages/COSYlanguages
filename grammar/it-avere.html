<!DOCTYPE html>
<html lang="it">
<head>
<script>if(localStorage.getItem("student_unlocked")!=="true")window.location.href="../days.html";</script>
<meta charset="UTF-8">
<title>Verbo AVERE — COSYlanguages</title>
<link rel="icon" href="../images/cosylanguages.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Lora:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="grammar-body">

<div class="grammar-header-new">
  <div>
    <div class="breadcrumb">Student Area 🔐</div>
    <h1>Verbo AVERE</h1>
  </div>
  <a href="it.html" class="lang-tab active">← Programma</a>
</div>

<div class="grammar-layout">
<nav class="grammar-sidebar">
  <a class="gs-item active" href="#conjugation">Conjugazione</a>
  <a class="gs-item" href="#quiz">Quiz</a>
  <div class="gs-label">Navigazione</div>
  <a class="gs-item" href="it.html">← Programma</a>
</nav>

<main class="grammar-main">
  <div class="g-card" id="conjugation">
    <div class="g-card-title">Presente Indicativo</div>
    <table class="gtable">
      <tr><td class="row-label">io</td><td class="content"><span class="key-verb">ho</span></td></tr>
      <tr><td class="row-label">tu</td><td class="content"><span class="key-verb">hai</span></td></tr>
      <tr><td class="row-label">lui / lei / Lei</td><td class="content"><span class="key-verb">ha</span></td></tr>
      <tr><td class="row-label">noi</td><td class="content"><span class="key-verb">abbiamo</span></td></tr>
      <tr><td class="row-label">voi</td><td class="content"><span class="key-verb">avete</span></td></tr>
      <tr><td class="row-label">loro</td><td class="content"><span class="key-verb">hanno</span></td></tr>
    </table>
  </div>

  <div class="g-quiz-card" id="quiz">
    <div class="g-card-title">Quiz Interactif</div>
    <div class="g-quiz-body">
      <div class="g-quiz-q" id="q1">
        <div class="g-quiz-prompt">Tu ___ un libro.</div>
        <div class="g-quiz-options">
          <button class="g-quiz-opt" onclick="answer(this,'q1','hai')">hai</button>
          <button class="g-quiz-opt" onclick="answer(this,'q1','ha')">ha</button>
        </div>
        <div class="quiz-feedback" id="fb-q1"></div>
      </div>
    </div>
  </div>
</main>
</div>

<script>
const answers={q1:'hai'};
function answer(btn,qid,chosen){
  const correct=answers[qid]; const fb=document.getElementById("fb-"+qid);
  if(chosen===correct){ btn.classList.add("correct"); fb.textContent="Esatto! ✅"; }
  else { btn.classList.add("wrong"); fb.textContent="Riprova! ❌"; }
}
  else { btn.classList.add('wrong'); fb.textContent='Riprova! ❌'; }
}
</script>
<script src="../js/data/curriculum_data.js"></script>
<script>
(function() {
  const code = localStorage.getItem("student_course_code");
  if (code && typeof COURSES !== "undefined" && COURSES[code]) {
    const restrictedLevel = COURSES[code].level.toUpperCase();
    const lt = document.getElementById("roadmap-lang-tabs");
    if (lt) lt.style.display = "none";
    const arl = document.getElementById("all-roadmaps-link");
    if (arl) arl.style.display = "none";
    const nl = document.getElementById("nav-label");
    if (nl) nl.style.display = "none";

    document.querySelectorAll(".level-section").forEach(sec => {
      const badge = sec.querySelector(".level-badge");
      if (badge && !badge.textContent.includes(restrictedLevel)) {
        sec.style.display = "none";
        const id = sec.id;
        document.querySelectorAll(`.gs-item[href="#${id}"]`).forEach(item => item.style.display = "none");
      }
    });
    document.querySelectorAll(".grammar-sidebar").forEach(sb => {
        sb.querySelectorAll(".gs-label").forEach(label => {
            let next = label.nextElementSibling;
            let hasVisible = false;
            while(next && next.classList.contains("gs-item")) {
                if (next.style.display !== "none") { hasVisible = true; break; }
                next = next.nextElementSibling;
            }
            if (!hasVisible) label.style.display = "none";
        });
    });
  }
})();
</script>
</body>
</html>
