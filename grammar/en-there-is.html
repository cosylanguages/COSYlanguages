<!DOCTYPE html>
<html lang="en">
<head>
<script>if(localStorage.getItem("student_unlocked")!=="true")window.location.href="../days.html";</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>There is / There are · English Grammar — COSYlanguages</title>
<link rel="icon" href="../images/cosylanguages.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Lora:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="grammar-body">

<div class="grammar-header-new">
  <div>
    <div class="breadcrumb">English Roadmap → There is / There are</div>
    <h1>There is / There are · English Grammar</h1>
  </div>
  <a href="en.html" class="lang-tab active">← Roadmap</a>
</div>

<div class="grammar-layout">
<nav class="grammar-sidebar">
  <a class="gs-item active" href="#rules">Rules</a>
  <a class="gs-item" href="#quiz">Quiz</a>
  <div class="gs-label">Navigation</div>
  <a class="gs-item" href="en.html">← Roadmap</a>
</nav>

<main class="grammar-main">
  <div class="level-section" id="rules">
    <div class="g-card">
      <div class="card-title">Singular vs Plural</div>
      <table class="gtable">
        <tr><td class="row-label">Singular</td><td class="content"><span class="key-verb">There is</span></td><td class="content">There is a park.</td></tr>
        <tr><td class="row-label">Plural</td><td class="content"><span class="key-verb">There are</span></td><td class="content">There are three shops.</td></tr>
        <tr class="section-row"><td colspan="3">Negative</td></tr>
        <tr><td class="row-label">Singular</td><td class="content"><span class="key-neg">There isn't</span></td><td class="content">There isn't a bus.</td></tr>
      </table>
    </div>
  </div>

  <div class="g-quiz-card" id="quiz">
    <div class="g-card-title">Interactive Quiz</div>
    <div class="g-quiz-body">
      <div class="g-quiz-q" id="q1">
        <div class="g-quiz-prompt">___ many people here.</div>
        <div class="g-quiz-options">
          <button class="g-quiz-opt" onclick="answer(this,'q1','are')">There are</button>
          <button class="g-quiz-opt" onclick="answer(this,'q1','is')">There is</button>
        </div>
        <div class="quiz-feedback" id="fb-q1"></div>
      </div>
    </div>
  </div>
</main>
</div>

<script>
const answers={q1:'are'};
function answer(btn,qid,chosen){
  const correct=answers[qid]; const fb=document.getElementById('fb-'+qid);
  if(chosen===correct){ btn.classList.add('correct'); fb.textContent='Correct! ✅'; }
  else { btn.classList.add('wrong'); fb.textContent='Try again! ❌'; }
}
</script>
</body>
</html>
