<body class="grammar-body">

<div class="grammar-header-new">
  <div>
    <div class="breadcrumb">My Lessons 🔐 → Grammar Reference</div>
    <h1>Ελληνική Γραμματική 🇬🇷</h1>
  </div>
  <div class="lang-tabs">
    <a href="en.html" class="lang-tab">🇬🇧 EN</a>
    <a href="fr.html" class="lang-tab">🇫🇷 FR</a>
    <a href="it.html" class="lang-tab">🇮🇹 IT</a>

  </div>

<div class="grammar-layout">
<nav class="grammar-sidebar">
  <div class="gs-label">Αρχάριοι (A1)</div>
  <a class="gs-item active" href="#be_verb">Ρήμα «είμαι»</a>
</nav>

<main class="grammar-main">
  <div class="grammar-section-title">Ελληνικά — Γραμματική αναφορά</div>

  <div class="level-section" id="be_verb">
    <div class="level-badge">A1 — STARTER</div>
    <div class="g-card">
      <div class="card-title">Ρήμα ΕΙΜΑΙ — Ενεστώτας</div>
      <table class="gtable">
        <tr><td class="row-label">εγώ</td><td class="content"><span class="key-verb">είμαι</span></td><td class="content">Εγώ <span class="key-verb">είμαι</span> δάσκαλος.</td></tr>
        <tr><td class="row-label">εσύ</td><td class="content"><span class="key-verb">είσαι</span></td><td class="content">Εσύ <span class="key-verb">είσαι</span> εδώ;</td></tr>
      </table>
    </div>
  </div>

</main>
</div>

<script>
const items = document.querySelectorAll('.gs-item');
const sections = document.querySelectorAll('.level-section');
const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      items.forEach(i => i.classList.remove('active'));
      const link = document.querySelector(`.gs-item[href="#${entry.target.id}"]`);
      if (link) link.classList.add('active');
    }
  });
}, { threshold: 0.3 });
sections.forEach(s => observer.observe(s));
</script>

</body>
</html>
