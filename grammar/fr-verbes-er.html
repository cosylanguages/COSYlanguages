<!DOCTYPE html>
<html lang="fr">
<head>
<script>if(localStorage.getItem("student_unlocked")!=="true")window.location.href="../days.html";</script>
<meta charset="UTF-8">
<title>Verbes en -ER — COSYlanguages</title>
<link rel="icon" href="../images/cosylanguages.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Lora:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Lora:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="grammar-body">

<div class="grammar-header-new">
  <div>
    <div class="breadcrumb">Student Area 🔐</div>
    <h1>Verbes en -ER</h1>
  </div>
  <a href="fr.html" class="lang-tab active">← Roadmap</a>
</div>

<div class="grammar-layout">
<nav class="grammar-sidebar">

  <div class="gs-label" id="nav-label">Navigation</div>
  <a class="gs-item" href="fr.html">← Roadmap</a>
</nav>
<main class="grammar-main">
  <div class="g-card">
    <div class="g-card-title">parler (to speak)</div>
    <table class="gtable">
      <tr><td style="background:#000;color:#fff">je</td><td>parl<span style="color:var(--fr-blue)">e</span></td></tr>
      <tr><td style="background:#000;color:#fff">tu</td><td>parl<span style="color:var(--fr-blue)">es</span></td></tr>
      <tr><td style="background:#000;color:#fff">il/elle</td><td>parl<span style="color:var(--fr-blue)">e</span></td></tr>
    </table>
  </div>
  <div class="formula-card">
    <h3>Practice: Choose the ending</h3>
    <div style="margin-top:1rem">
      <p>Je parl<span class="pr-drop" id="d1" onclick="this.textContent='e';this.classList.add('correct')">?</span></p>
      <div style="margin-top:1rem">
        <button onclick="document.getElementById('d1').textContent='e';document.getElementById('d1').classList.add('correct')">e</button>
        <button onclick="document.getElementById('d1').textContent='es';document.getElementById('d1').classList.remove('correct')">es</button>
      </div>
    </div>
  </div>
</main>
</div>
<script src="../js/data/curriculum_data.js"></script>
<script>
(function() {
  const code = localStorage.getItem("student_course_code");
  if (code && typeof COURSES !== "undefined" && COURSES[code]) {
    const restrictedLevel = COURSES[code].level.toUpperCase();
    const lt = document.getElementById("roadmap-lang-tabs");
    if (lt) lt.style.display = "none";
    const arl = document.getElementById("all-roadmaps-link");
    if (arl) arl.style.display = "none";
    const nl = document.getElementById("nav-label");
    if (nl) nl.style.display = "none";

    document.querySelectorAll(".level-section").forEach(sec => {
      const badge = sec.querySelector(".level-badge");
      if (badge && !badge.textContent.includes(restrictedLevel)) {
        sec.style.display = "none";
        const id = sec.id;
        document.querySelectorAll(`.gs-item[href="#${id}"]`).forEach(item => item.style.display = "none");
      }
    });
    document.querySelectorAll(".grammar-sidebar").forEach(sb => {
        sb.querySelectorAll(".gs-label").forEach(label => {
            let next = label.nextElementSibling;
            let hasVisible = false;
            while(next && next.classList.contains("gs-item")) {
                if (next.style.display !== "none") { hasVisible = true; break; }
                next = next.nextElementSibling;
            }
            if (!hasVisible) label.style.display = "none";
        });
    });
  }
})();
</script>
</body>
</html>
