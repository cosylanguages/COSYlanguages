<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verb TO BE — COSYlanguages</title>
<link rel="icon" href="../images/cosylanguages.png">
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="grammar-body">
<nav id="main-nav">
  <a class="nav-logo" href="../index.html"><img src="../images/cosylanguages.png"></a>
  <ul class="nav-links"><li><a href="en.html">🇬🇧 English Roadmap</a></li></ul>
</nav>
<div class="grammar-header">
  <h1>🇬🇧 Verb TO BE</h1>
</div>
<div class="grammar-layout">
<nav class="grammar-sidebar">
  <a class="gs-item active" href="#present">Present Simple</a>
  <a class="gs-item" href="#quiz">Interactive Quiz</a>
  <div class="gs-label">Next steps</div>
  <a class="gs-item" href="en-have.html">→ Verb TO HAVE</a>
</nav>
<main class="grammar-main">
  <div class="grammar-section-title">English — Verb TO BE</div>
  <div class="g-card" id="present">
    <div class="g-card-title">Present Simple Forms</div>
    <table class="g-table">
      <tr class="section-row"><td colspan="3">Affirmative</td></tr>
      <tr><td class="row-label">I</td><td class="content"><span class="key-verb">am</span></td><td>I am a student.</td></tr>
      <tr><td class="row-label">You/We/They</td><td class="content"><span class="key-verb">are</span></td><td>We are ready.</td></tr>
      <tr><td class="row-label">He/She/It</td><td class="content"><span class="key-verb">is</span></td><td>She is happy.</td></tr>
    </table>
  </div>

  <div class="g-quiz-card" id="quiz">
    <div class="g-card-title">Interactive Quiz</div>
    <div class="g-quiz-body">
      <div class="g-quiz-q" id="q1"><div class="g-quiz-prompt">They ___ my friends.</div><div class="g-quiz-options"><button class="g-quiz-opt" onclick="answer(this,'q1','are')">are</button><button class="g-quiz-opt" onclick="answer(this,'q1','is')">is</button></div><div class="g-quiz-feedback" id="fb-q1"></div></div>
      <div class="g-quiz-q" id="q2"><div class="g-quiz-prompt">It ___ a beautiful day.</div><div class="g-quiz-options"><button class="g-quiz-opt" onclick="answer(this,'q2','is')">is</button><button class="g-quiz-opt" onclick="answer(this,'q2','am')">am</button></div><div class="g-quiz-feedback" id="fb-q2"></div></div>
    </div>
  </div>
</main>
</div>
<script>
const answers={q1:'are',q2:'is'};
function answer(btn,qid,chosen){
  const correct=answers[qid]; const fb=document.getElementById('fb-'+qid);
  if(chosen===correct){ btn.classList.add('correct'); fb.textContent='Correct!'; }
  else { btn.classList.add('wrong'); fb.textContent='Not quite.'; }
}
</script>
</body>
</html>
