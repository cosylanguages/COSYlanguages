<!DOCTYPE html>
<html lang="en">
<head>
<script>if(localStorage.getItem("student_unlocked")!=="true")window.location.href="../days.html";</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Present Simple — COSYlanguages</title>
<link rel="icon" href="../images/cosylanguages.png">
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="grammar-body">
<nav id="main-nav">
  <a class="nav-logo" href="../index.html"><img src="../images/cosylanguages.png"></a>
  <ul class="nav-links"><li><a href="en.html">🇬🇧 English Roadmap</a></li></ul>
</nav>
<div class="grammar-header">
  <h1>🇬🇧 Present Simple</h1>
</div>
<div class="grammar-layout">
<nav class="grammar-sidebar">
  <a class="gs-item active" href="#rules">The "S" Rule</a>
  <a class="gs-item" href="#quiz">Interactive Quiz</a>
  <div class="gs-label">Next steps</div>
  <a class="gs-item" href="en-past-simple.html">→ Past Simple</a>
</nav>
<main class="grammar-main">
  <div class="grammar-section-title">English — Present Simple</div>
  <div class="g-card" id="rules">
    <div class="g-card-title">The Third Person</div>
    <table class="g-table">
      <tr class="section-row"><td colspan="2">Affirmative</td></tr>
      <tr><td class="row-label">I/You/We/They</td><td>work</td></tr>
      <tr><td class="row-label">He/She/It</td><td>work<span class="key-verb">s</span></td></tr>
    </table>
  </div>

  <div class="g-quiz-card" id="quiz">
    <div class="g-card-title">Interactive Quiz</div>
    <div class="g-quiz-body">
      <div class="g-quiz-q" id="q1">
        <div class="g-quiz-prompt">She ___ in London.</div>
        <div class="g-quiz-options">
          <button class="g-quiz-opt" onclick="answer(this,'q1','works')">works</button>
          <button class="g-quiz-opt" onclick="answer(this,'q1','work')">work</button>
        </div>
        <div class="quiz-feedback" id="fb-q1"></div>
      </div>
    </div>
  </div>
</main>
</div>
<script>
const answers={q1:'works'};
function answer(btn,qid,chosen){
  const correct=answers[qid]; const fb=document.getElementById('fb-'+qid);
  if(chosen===correct){ btn.classList.add('correct'); fb.textContent='Correct!'; }
  else { btn.classList.add('wrong'); fb.textContent='Not quite.'; }
}
</script>
</body>
</html>
