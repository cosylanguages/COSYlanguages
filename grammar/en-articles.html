</head>
<body class="grammar-body">
<nav id="main-nav">
  <a class="nav-logo" href="../index.html"><img src="../images/cosylanguages.png"></a>
  <ul class="nav-links"><li><a href="en.html">🇬🇧 English Roadmap</a></li></ul>
</nav>
<div class="grammar-header">
  <h1>🇬🇧 Articles: A, AN, THE</h1>
</div>
<div class="grammar-layout">
<nav class="grammar-sidebar">
  <a class="gs-item active" href="#rules">Basic Rules</a>
  <a class="gs-item" href="#quiz">Interactive Quiz</a>
  <div class="gs-label">Next steps</div>
  <a class="gs-item" href="en-present-simple.html">→ Present Simple</a>
</nav>
<main class="grammar-main">
  <div class="grammar-section-title">English — Articles</div>
  <div class="g-card" id="rules">
    <div class="g-card-title">A vs AN</div>
    <div style="padding:1.5rem; color: var(--black); font-weight: 700;">
        <p>Use <strong style="color: var(--honey);">A</strong> before consonant sounds:</p>
        <p style="margin-bottom:1rem; opacity: 0.8;">a book, a car, a university</p>
        <p>Use <strong style="color: var(--honey);">AN</strong> before vowel sounds:</p>
        <p style="opacity: 0.8;">an apple, an egg, an hour</p>
    </div>
  </div>

  <div class="g-quiz-card" id="quiz">
    <div class="g-card-title">Interactive Quiz</div>
    <div class="g-quiz-body">
      <div class="g-quiz-q" id="q1">
        <div class="g-quiz-prompt">I have ___ apple.</div>
        <div class="g-quiz-options">
          <button class="g-quiz-opt" onclick="answer(this,'q1','an')">an</button>
          <button class="g-quiz-opt" onclick="answer(this,'q1','a')">a</button>
        </div>
        <div class="quiz-feedback" id="fb-q1"></div>
      </div>
    </div>
  </div>
</main>
</div>
<script>
const answers={q1:'an'};
function answer(btn,qid,chosen){
  const correct=answers[qid]; const fb=document.getElementById('fb-'+qid);
  if(chosen===correct){ btn.classList.add('correct'); fb.textContent='Correct!'; }
  else { btn.classList.add('wrong'); fb.textContent='Not quite.'; }
}
</script>
</body>
