<!DOCTYPE html>
<html lang="fr">
<head>

<script>if(localStorage.getItem("student_unlocked")!=="true")window.location.href="../days.html";</script>
<meta charset="UTF-8">
<title>Le verbe ÊTRE — COSYlanguages</title>
<link rel="icon" href="../images/cosylanguages.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Lora:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
<style>
:root { --sage: #6b8f71; --sage-dark: #4a6b50; --honey: #e8a838; --black: #2a2a2a; --white: #FFFFFF; --red: #FF4136; --it-green: #009246; }
body { font-family: 'Nunito', sans-serif; background: var(--sage); color: var(--black); }
nav#main-nav { height: 66px; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; background: #fff; }
.nav-logo img { height: 44px; }
.page-header { background: var(--black); color: var(--white); padding: 1rem 2rem; }
.main { padding: 2rem; max-width: 800px; margin: 0 auto; }
.card { background: var(--sage); border: 3px solid var(--black); border-radius: 4px; box-shadow: 5px 5px 0 var(--black); overflow: hidden; margin-bottom: 2rem; }
.card-title { background: var(--black); color: var(--white); padding: .65rem 1.1rem; text-align: center; font-family: 'Lora', serif; }
.gtable { width: 100%; border-collapse: collapse; }
.gtable td { border: 2px solid var(--black); padding: .6rem .9rem; font-weight: 700; }
.key-verb { color: var(--honey); }
.quiz-card { background: #fdf8f0; border: 3px solid var(--black); padding: 1.5rem; border-radius: 4px; box-shadow: 5px 5px 0 var(--black); }
.quiz-opt { background: #fff; border: 2px solid var(--black); padding: .4rem 1rem; cursor: pointer; border-radius: 4px; font-weight: 800; margin-right: .5rem; }
.quiz-opt.correct { background: var(--it-green); color: #fff; }
.quiz-opt.wrong { background: var(--red); color: #fff; }
</style>
</head>
<body>
<nav id="main-nav"><a class="nav-logo" href="../index.html"><img src="../images/cosylanguages.png"></a></nav>
<div class="page-header"><h1>Français — Le verbe ÊTRE</h1></div>
<main class="main">
  <div class="card">
    <div class="card-title">Présent de l'Indicatif</div>
    <table class="gtable">
      <tr><td style="background:#000;color:#fff">je</td><td>suis</td></tr>
      <tr><td style="background:#000;color:#fff">tu</td><td>es</td></tr>
      <tr><td style="background:#000;color:#fff">il/elle</td><td>est</td></tr>
      <tr><td style="background:#000;color:#fff">nous</td><td>sommes</td></tr>
      <tr><td style="background:#000;color:#fff">vous</td><td>êtes</td></tr>
      <tr><td style="background:#000;color:#fff">ils/elles</td><td>sont</td></tr>
    </table>
  </div>
  <div class="quiz-card">
    <h3>Quiz: Choisissez la bonne forme</h3>
    <div style="margin-top:1rem">
      <p>Nous ___ à Paris.</p>
      <button class="quiz-opt" onclick="this.classList.add('correct')">sommes</button>
      <button class="quiz-opt" onclick="this.classList.add('wrong')">somme</button>
    </div>
  </div>
</main>
</body>
</html>
