<!DOCTYPE html>
<html lang="pt">
<head>
<script>if(localStorage.getItem("student_unlocked")!=="true")window.location.href="../days.html";</script>
<meta charset="UTF-8">
<title>Artigos Definidos · Portuguese Articles — COSYlanguages</title>
<link rel="icon" href="../images/cosylanguages.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Lora:wght@600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="grammar-body">

<div class="grammar-header-new">
  <div>
    <div class="breadcrumb">Portuguese Roadmap → Artigos Definidos</div>
    <h1>Artigos Definidos · Portuguese Articles</h1>
  </div>
  <a href="pt.html" class="lang-tab active">← Programa</a>
</div>

<div class="grammar-layout">
<nav class="grammar-sidebar">
  <a class="gs-item active" href="#rules">Regras</a>
  <a class="gs-item" href="#quiz">Quiz</a>
  <div class="gs-label">Navegação</div>
  <a class="gs-item" href="pt.html">← Programa</a>
</nav>

<main class="grammar-main">
  <div class="g-card" id="rules">
    <div class="g-card-title">O, A, OS, AS</div>
    <table class="gtable">
      <tr><td class="row-label">o</td><td class="content">masculino singular</td><td class="content">o livro</td></tr>
      <tr><td class="row-label">a</td><td class="content">feminino singular</td><td class="content">a casa</td></tr>
      <tr><td class="row-label">os</td><td class="content">masculino plural</td><td class="content">os livros</td></tr>
      <tr><td class="row-label">as</td><td class="content">feminino plural</td><td class="content">as casas</td></tr>
    </table>
  </div>

  <div class="g-quiz-card" id="quiz">
    <div class="g-card-title">Quiz Interativo</div>
    <div class="g-quiz-body">
      <div class="g-quiz-q" id="q1">
        <div class="g-quiz-prompt">___ amigos.</div>
        <div class="g-quiz-options">
          <button class="g-quiz-opt" onclick="answer(this,'q1','os')">os</button>
          <button class="g-quiz-opt" onclick="answer(this,'q1','as')">as</button>
        </div>
        <div class="quiz-feedback" id="fb-q1"></div>
      </div>
    </div>
  </div>
</main>
</div>

<script>
const answers={q1:'os'};
function answer(btn,qid,chosen){
  const correct=answers[qid]; const fb=document.getElementById('fb-'+qid);
  if(chosen===correct){ btn.classList.add('correct'); fb.textContent='Correto! ✅'; }
  else { btn.classList.add('wrong'); fb.textContent='Tente novamente! ❌'; }
}
</script>
</body>
</html>
