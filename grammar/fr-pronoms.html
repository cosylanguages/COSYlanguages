<!DOCTYPE html>
<html lang="fr">
<head>
<script>if(localStorage.getItem("student_unlocked")!=="true")window.location.href="../days.html";</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Les Pronoms — COSYlanguages</title>
<link rel="icon" href="../images/cosylanguages.png">
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="grammar-body">
<nav id="main-nav">
  <a class="nav-logo" href="../index.html"><img src="../images/cosylanguages.png"></a>
  <ul class="nav-links"><li><a href="fr.html">🇫🇷 Parcours de Grammaire</a></li></ul>
</nav>
<div class="grammar-header">
  <h1>🇫🇷 Les Pronoms</h1>
</div>
<div class="grammar-layout">
<nav class="grammar-sidebar">
  <a class="gs-item active" href="#sujet">Pronoms Sujets</a>
  <a class="gs-item" href="#quiz">Quiz Interactif</a>
</nav>
<main class="grammar-main">
  <div class="grammar-section-title">Français — Les Pronoms</div>

  <div class="g-card" id="sujet">
    <div class="g-card-title">Pronoms Sujets</div>
    <table class="g-table">
      <tr><td class="row-label">Je / J'</td><td>I</td></tr>
      <tr><td class="row-label">Tu</td><td>You (singular, informal)</td></tr>
      <tr><td class="row-label">Il / Elle / On</td><td>He / She / We (informal)</td></tr>
      <tr><td class="row-label">Nous</td><td>We (formal)</td></tr>
      <tr><td class="row-label">Vous</td><td>You (plural or formal)</td></tr>
      <tr><td class="row-label">Ils / Elles</td><td>They</td></tr>
    </table>
  </div>

  <div class="g-quiz-card" id="quiz">
    <div class="g-card-title">Quiz Interactif</div>
    <div class="g-quiz-body">
      <div class="g-quiz-q" id="q1">
        <div class="g-quiz-prompt">___ suis étudiant.</div>
        <div class="g-quiz-options">
          <button class="g-quiz-opt" onclick="answer(this,'q1','Je')">Je</button>
          <button class="g-quiz-opt" onclick="answer(this,'q1','Tu')">Tu</button>
        </div>
        <div class="quiz-feedback" id="fb-q1"></div>
      </div>
    </div>
  </div>
</main>
</div>
<script>
const answers={q1:'Je'};
function answer(btn,qid,chosen){
  const correct=answers[qid]; const fb=document.getElementById('fb-'+qid);
  if(chosen===correct){ btn.classList.add('correct'); fb.textContent='Bravo !'; }
  else { btn.classList.add('wrong'); fb.textContent='Pas tout à fait.'; }
}
</script>
</body>
</html>
