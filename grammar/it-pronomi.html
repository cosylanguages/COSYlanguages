<!DOCTYPE html>
<html lang="it">
<head>
<script>if(localStorage.getItem("student_unlocked")!=="true")window.location.href="../days.html";</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronomi Soggetto — COSYlanguages</title>
<link rel="icon" href="../images/cosylanguages.png">
<link rel="stylesheet" href="../css/style.css">
</head>
<body class="grammar-body">
<nav id="main-nav">
  <a class="nav-logo" href="../index.html"><img src="../images/cosylanguages.png"></a>
  <ul class="nav-links"><li><a href="it.html">🇮🇹 Programma di Grammatica</a></li></ul>
</nav>
<div class="grammar-header">
  <h1>🇮🇹 Pronomi Soggetto</h1>
</div>
<div class="grammar-layout">
<nav class="grammar-sidebar">
  <a class="gs-item active" href="#sujet">Pronomi</a>
  <a class="gs-item" href="#quiz">Quiz Interattivo</a>
</nav>
<main class="grammar-main">
  <div class="grammar-section-title">Italiano — I Pronomi Soggetto</div>

  <div class="g-card" id="sujet">
    <div class="g-card-title">Pronomi Soggetto</div>
    <table class="g-table">
      <tr><td class="row-label">io</td><td>I</td></tr>
      <tr><td class="row-label">tu</td><td>you (informal)</td></tr>
      <tr><td class="row-label">lui / lei / Lei</td><td>he / she / you (formal)</td></tr>
      <tr><td class="row-label">noi</td><td>we</td></tr>
      <tr><td class="row-label">voi</td><td>you (plural)</td></tr>
      <tr><td class="row-label">loro</td><td>they</td></tr>
    </table>
  </div>

  <div class="g-quiz-card" id="quiz">
    <div class="g-card-title">Quiz Interattivo</div>
    <div class="g-quiz-body">
      <div class="g-quiz-q" id="q1">
        <div class="g-quiz-prompt">___ sono italiano.</div>
        <div class="g-quiz-options">
          <button class="g-quiz-opt" onclick="answer(this,'q1','io')">io</button>
          <button class="g-quiz-opt" onclick="answer(this,'q1','tu')">tu</button>
        </div>
        <div class="quiz-feedback" id="fb-q1"></div>
      </div>
    </div>
  </div>
</main>
</div>
<script>
const answers={q1:'io'};
function answer(btn,qid,chosen){
  const correct=answers[qid]; const fb=document.getElementById('fb-'+qid);
  if(chosen===correct){ btn.classList.add('correct'); fb.textContent='Esatto!'; }
  else { btn.classList.add('wrong'); fb.textContent='Non proprio.'; }
}
</script>
</body>
</html>
