<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal — COSYlanguages</title>
    <link rel="icon" href="../images/logos/cosylanguages.png">

    <link rel="stylesheet" href="../css/tokens.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/portal.css">
</head>
<body class="mode-free">
    <nav id="cosy-nav"></nav>

    <div id="gate">
        <div class="gate-card">
            <div class="gate-icon">✨</div>
            <h2 data-translate-key="portal_welcome">Welcome to COSYportal</h2>
            <p class="gate-subtitle" data-translate-key="portal_subtitle">Enter your code to unlock your path, or explore our first steps for free.</p>

            <div class="gate-input-section">
                <input id="mp-gateway-code" type="text" placeholder="Reality Code" class="app-input gate-input" oninput="this.value=this.value.toUpperCase()">
                <button onclick="handleUnlock()" class="btn-primary gate-btn-unlock">Unlock →</button>
                <p id="mp-gateway-error" class="gate-error" data-translate-key="mp_error_invalid">Invalid code. Please try again.</p>
            </div>

            <div class="gate-preview-section">
                <p class="gate-preview-label" data-translate-key="portal_preview">Preview Mode</p>
                <div class="gate-preview-controls">
                    <select id="free-lang" class="styled-sel gate-preview-sel">
                        <option value="en">English 🇬🇧</option>
                        <option value="fr">Français 🇫🇷</option>
                        <option value="it">Italiano 🇮🇹</option>
                        <option value="ru">Русский 🇷🇺</option>
                        <option value="el">Ελληνικά 🇬🇷</option>
                    </select>
                    <select id="free-level" class="styled-sel gate-preview-sel">
                        <option value="a1">Starter (A1)</option>
                        <option value="a2">Elementary (A2)</option>
                        <option value="b1">Intermediate (B1)</option>
                    </select>
                </div>
                <button onclick="handleFree()" class="btn-primary gate-btn-free" data-translate-key="portal_explore_free">Explore for Free 🔓</button>
            </div>

            <p class="gate-footer" data-translate-key="portal_need_account">Need a full account? <a href="https://wa.me/330766784195" data-translate-key="nav_contact">Contact us →</a></p>
        </div>
    </div>

    <script src="../js/core/engine.js"></script>
    <script src="../js/core/i18n.js"></script>
    <script src="./_auth/roles.js"></script>
    <script src="./_auth/access.js"></script>
    <script src="../js/portal/gateway.js"></script>

    <script type="module">
        import { supabase } from '../js/supabase.js';

        async function loginWithCode(code) {
            const { data, error } = await supabase
                .from('students')
                .select('*')
                .eq('access_code', code.trim().toUpperCase())
                .single();

            if (error || !data) {
                showError('Code not recognised. Check with your teacher.');
                return;
            }

            // Store minimal session info in sessionStorage
            sessionStorage.setItem('cosy_student', JSON.stringify({
                id: data.id,
                language: data.language,
                lang: data.language,
                level: data.level,
                course_type: data.course_type,
                course: data.course_type,
                code: data.access_code,
                name: data.email ? data.email.split('@')[0] : 'Learner'
            }));

            renderPortal(data);
        }

        function showError(msg) {
            const errorMsg = document.getElementById('mp-gateway-error');
            if (errorMsg) {
                errorMsg.textContent = msg;
                errorMsg.style.display = 'block';
                setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
            }
        }

        function renderPortal(data) {
            localStorage.setItem('cosy_mode', 'student');
            // Redirect to student area
            window.location.href = './student/index.html';
        }

        // Override handleUnlock from gateway.js
        window.handleUnlock = async function() {
            const codeInput = document.getElementById('mp-gateway-code');
            if (!codeInput) return;

            const code = codeInput.value.trim();
            if (!code) return;

            await loginWithCode(code);
        };
    </script>
    <script src="/js/config.js"></script>
</body>
</html>
