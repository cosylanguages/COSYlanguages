<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal — COSYlanguages</title>
    <link rel="icon" href="../images/logos/cosylanguages.png">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/tokens.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/portal.css">
</head>
<body class="student-portal-pro">
    <div id="gate" style="display: flex;">
        <div class="gate-card">
            <div style="font-size: 3rem; margin-bottom: 1rem;">✨</div>
            <h2 style="font-size: 1.8rem; margin-bottom: 0.5rem;">Welcome to COSYportal</h2>
            <p style="color: #666; margin-bottom: 1.5rem;">Enter your code to unlock your path, or explore our first steps for free.</p>

            <div style="background: #f9f9f9; padding: 1.5rem; border-radius: 20px; margin-bottom: 1.5rem;">
                <input id="mp-gateway-code" type="text" placeholder="Reality Code" style="width: 100%; padding: 0.8rem; border-radius: 12px; border: 2px solid #eee; text-align: center; font-family: monospace; font-size: 1rem; margin-bottom: 0.8rem;" oninput="this.value=this.value.toUpperCase()">
                <button onclick="handleUnlock()" class="btn-primary-new" style="width: 100%;">Unlock →</button>
                <p id="mp-gateway-error" style="color: red; font-size: 0.8rem; margin-top: 0.5rem; display: none;">Invalid code. Please try again.</p>
            </div>

            <div style="border-top: 1px solid #eee; padding-top: 1.5rem;">
                <p style="font-size: 0.8rem; font-weight: 800; color: #888; text-transform: uppercase; margin-bottom: 0.8rem;">Preview Mode</p>
                <div style="display: flex; gap: 8px; margin-bottom: 0.8rem;">
                    <select id="free-lang" style="flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #eee; font-family: inherit;">
                        <option value="en">English 🇬🇧</option>
                        <option value="fr">Français 🇫🇷</option>
                        <option value="it">Italiano 🇮🇹</option>
                        <option value="ru">Русский 🇷🇺</option>
                        <option value="el">Ελληνικά 🇬🇷</option>
                    </select>
                    <select id="free-level" style="flex: 1; padding: 10px; border-radius: 10px; border: 1px solid #eee; font-family: inherit;">
                        <option value="a1">Starter (A1)</option>
                        <option value="a2">Elementary (A2)</option>
                        <option value="b1">Intermediate (B1)</option>
                    </select>
                </div>
                <button onclick="handleFree()" class="btn-primary-new" style="width: 100%; background: var(--cosy-green);">Explore for Free 🔓</button>
            </div>

            <p style="font-size: 0.8rem; color: #888; margin-top: 1.5rem;">Need a full account? <a href="https://wa.me/330766784195" style="color: var(--cosy-green-dark); font-weight: 800;">Contact us →</a></p>
        </div>
    </div>

    <script src="../js/data/languages.js"></script>
    <script src="../js/core/engine.js"></script>
    <script src="../js/core/i18n.js"></script>
    <script src="../js/core/ui.js"></script>
    <script src="../js/data/pricing.js"></script>
    <script src="./_auth/roles.js"></script>
    <script src="./_auth/access.js"></script>
    <script>
        async function handleUnlock() {
            const codeInput = document.getElementById('mp-gateway-code');
            const errorMsg = document.getElementById('mp-gateway-error');
            const code = codeInput.value.trim();

            if (!code) return;

            // First try the new auth system
            const match = await cosyVerifyCode(code);
            if (match) {
                await COSY.unlock(code);
                window.location.href = `./${match.role}/index.html`;
                return;
            }

            // Fallback to legacy engine unlock (for COSY-DEMO, ARTPOP195430 etc.)
            const result = await COSY.unlock(code);
            if (result && result.ok) {
                const role = COSY.mode;
                cosySetRole(role);
                window.location.href = `./${role}/index.html`;
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
            }
        }

        function handleFree() {
            const lang = document.getElementById('free-lang').value;
            const level = document.getElementById('free-level').value;
            COSY.setFreeMode(lang, level);
            cosySetRole('free');
            window.location.href = './free/index.html';
        }

        // Auto-redirect if already logged in
        window.addEventListener('DOMContentLoaded', () => {
            const role = cosyGetRole();
            if (role && role !== 'free' && (COSY.student || COSY.teacher || COSY.admin)) {
                 window.location.href = `./${role}/index.html`;
            }
        });
    </script>
</body>
</html>
