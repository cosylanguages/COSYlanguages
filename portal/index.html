<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal — COSYlanguages</title>
    <link rel="icon" href="../images/logos/cosylanguages.png">

    <link rel="stylesheet" href="../css/tokens.css">
    <link rel="stylesheet" href="../css/base.css">
    <link rel="stylesheet" href="../css/components.css">
    <link rel="stylesheet" href="../css/portal.css">
</head>
<body class="mode-free">
    <nav id="cosy-nav"></nav>

    <div id="gate">
        <div class="gate-card">
            <div style="font-size: 3rem; margin-bottom: 1rem;">✨</div>
            <h2 data-translate-key="portal_welcome">Welcome to COSYportal</h2>
            <p style="color: var(--ink-soft); margin-bottom: 1.5rem;" data-translate-key="portal_subtitle">Enter your code to unlock your path, or explore our first steps for free.</p>

            <div style="background: var(--cream); padding: 1.5rem; border-radius: var(--r-lg); margin-bottom: 1.5rem; border: 1px solid var(--border);">
                <input id="mp-gateway-code" type="text" placeholder="Reality Code" class="app-input" style="width: 100%; font-size: 1.1rem; margin-bottom: 0.8rem; padding: 0.8rem;" oninput="this.value=this.value.toUpperCase()">
                <button onclick="handleUnlock()" class="btn-primary" style="width: 100%; justify-content: center; background: var(--ink); color: #fff;">Unlock →</button>
                <p id="mp-gateway-error" style="color: var(--rose); font-size: 0.8rem; margin-top: 0.5rem; display: none;" data-translate-key="mp_error_invalid">Invalid code. Please try again.</p>
            </div>

            <div style="border-top: 1px solid var(--border); padding-top: 1.5rem;">
                <p style="font-size: 0.8rem; font-weight: 800; color: var(--ink-faint); text-transform: uppercase; margin-bottom: 0.8rem;" data-translate-key="portal_preview">Preview Mode</p>
                <div style="display: flex; gap: 8px; margin-bottom: 0.8rem;">
                    <select id="free-lang" class="styled-sel" style="flex: 1;">
                        <option value="en">English 🇬🇧</option>
                        <option value="fr">Français 🇫🇷</option>
                        <option value="it">Italiano 🇮🇹</option>
                        <option value="ru">Русский 🇷🇺</option>
                        <option value="el">Ελληνικά 🇬🇷</option>
                    </select>
                    <select id="free-level" class="styled-sel" style="flex: 1;">
                        <option value="a1">Starter (A1)</option>
                        <option value="a2">Elementary (A2)</option>
                        <option value="b1">Intermediate (B1)</option>
                    </select>
                </div>
                <button onclick="handleFree()" class="btn-primary" style="width: 100%; justify-content: center; background: var(--sage); color: #fff;" data-translate-key="portal_explore_free">Explore for Free 🔓</button>
            </div>

            <p style="font-size: 0.8rem; color: var(--ink-faint); margin-top: 1.5rem;" data-translate-key="portal_need_account">Need a full account? <a href="https://wa.me/330766784195" style="color: var(--sage-dark); font-weight: 800;" data-translate-key="nav_contact">Contact us →</a></p>
        </div>
    </div>

    <script src="../js/core/engine.js"></script>
    <script src="../js/core/i18n.js"></script>
    <script src="./_auth/roles.js"></script>
    <script src="./_auth/access.js"></script>
    <script>
        async function handleUnlock() {
            const codeInput = document.getElementById('mp-gateway-code');
            const errorMsg = document.getElementById('mp-gateway-error');
            const code = codeInput.value.trim();

            if (!code) return;

            const match = await cosyVerifyCode(code);
            if (match) {
                await COSY.unlock(code);
                window.location.href = `./${match.role}/index.html`;
                return;
            }

            const result = await COSY.unlock(code);
            if (result && result.ok) {
                const role = COSY.mode;
                cosySetRole(role);
                window.location.href = `./${role}/index.html`;
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => { errorMsg.style.display = 'none'; }, 3000);
            }
        }

        function handleFree() {
            const lang = document.getElementById('free-lang').value;
            const level = document.getElementById('free-level').value;
            COSY.setFreeMode(lang, level);
            cosySetRole('free');
            window.location.href = './free/index.html';
        }

        window.addEventListener('DOMContentLoaded', () => {
            const role = cosyGetRole();
            if (role && role !== 'free' && (COSY.student || COSY.teacher || COSY.admin)) {
                 window.location.href = `./${role}/index.html`;
            }
        });
    </script>
</body>
</html>
