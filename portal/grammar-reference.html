<!DOCTYPE html>
<html lang="en">
<head>
<script>if(localStorage.getItem("student_unlocked")!=="true")window.location.href="index.html";</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Reference — COSYlanguages</title>
    <!-- Data Dependencies -->
    <script src="../js/data/curriculum_data.js"></script>
    <script src="../js/data/grammar_config.js"></script>
    <script src="../js/core/linguistics.js"></script>
    <script src="../js/core/i18n.js"></script>
    <script src="../js/core/engine.js"></script>
<link rel="icon" href="images/cosylanguages.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Lora:wght@600;700&display=swap" rel="stylesheet">
<style>
:root {
  --teal:     #00B5A3;
  --teal-dk:  #008F80;
  --teal-lt:  #00CFC0;
  --black:    #111111;
  --white:    #FFFFFF;
  --yellow:   #FFE135;
  --red:      #FF4136;
  --orange:   #FF6B1A;
  --green:    #2ECC40;
  --blue:     #0074D9;
  --cream:    #FFFDF5;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--teal);
  color: var(--black);
  min-height: 100vh;
}

.page-header {
  background: var(--black);
  color: var(--white);
  padding: 1rem 2rem;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: .8rem;
  position: sticky; top: 0; z-index: 300;
  border-bottom: 3px solid var(--yellow);
}
.page-header h1 {
  font-family: 'Lora', serif;
  font-size: 1.3rem;
  font-weight: 700;
  letter-spacing: .02em;
}
.lang-tabs { display: flex; gap: .4rem; }
.lang-tab {
  background: rgba(255,255,255,.12);
  border: 2px solid rgba(255,255,255,.3);
  border-radius: 999px;
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-size: .78rem;
  font-weight: 800;
  padding: .25rem .75rem;
  cursor: pointer;
  transition: all .18s;
  text-decoration: none;
}
.lang-tab.active { background: var(--teal); border-color: var(--teal); color: var(--black); }

.layout { display: grid; grid-template-columns: 240px 1fr; min-height: calc(100vh - 60px); }

.sidebar {
  background: var(--teal-dk);
  padding: 1.5rem 0;
  border-right: 3px solid var(--black);
  position: sticky; top: 66px; height: calc(100vh - 66px); overflow-y: auto;
}
.sidebar-section { margin-bottom: .3rem; }
.sidebar-label { font-size: .62rem; font-weight: 900; color: rgba(255,255,255,.85); padding: .8rem 1.2rem .3rem; text-transform: uppercase; }
.sidebar-item { display: block; padding: .5rem 1.2rem; font-size: .82rem; font-weight: 700; color: rgba(255,255,255,.85); cursor: pointer; text-decoration: none; border-left: 3px solid transparent; }
.sidebar-item:hover { background: rgba(0,0,0,.15); color: #fff; }
.sidebar-item.active { border-left-color: var(--yellow); background: rgba(0,0,0,.2); color: var(--yellow); }

.main { padding: 2rem; background: var(--teal); }

.level-badge { display: inline-block; background: var(--black); color: var(--yellow); font-size: .75rem; font-weight: 900; padding: .3rem .9rem; border-radius: 999px; margin-bottom: .8rem; text-transform: uppercase; }

.card { background: var(--teal); border: 3px solid var(--black); border-radius: 4px; margin-bottom: 2rem; overflow: hidden; box-shadow: 6px 6px 0 var(--black); }
.card-title { background: var(--black); color: var(--white); font-family: 'Lora', serif; font-size: 1.2rem; font-weight: 700; padding: .8rem 1.2rem; text-align: center; }
.card-meta { background: var(--teal-dk); padding: 0.5rem; display: flex; justify-content: center; gap: 0.5rem; border-bottom: 2px solid var(--black); }
.meta-badge { font-size: 0.65rem; font-weight: 900; text-transform: uppercase; padding: 0.2rem 0.6rem; border-radius: 4px; background: var(--black); color: var(--white); }

.tense-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 1rem; padding: 1rem; }
.tense-container { border: 2px solid var(--black); border-radius: 4px; background: var(--white); overflow: hidden; }
.tense-header { background: var(--black); color: var(--yellow); font-size: 0.75rem; font-weight: 900; padding: 0.4rem; text-align: center; text-transform: uppercase; }

.gtable { width: 100%; border-collapse: collapse; }
.gtable td { border: 1px solid #ddd; padding: .4rem .6rem; font-size: .85rem; font-weight: 700; }
.gtable .row-label { background: #f9f9f9; width: 30%; font-size: 0.75rem; }

.key-verb { color: var(--blue); }
.key-neg { color: var(--red); }
.section-title { font-family: 'Lora', serif; font-size: 1.6rem; font-weight: 700; margin-bottom: 1.5rem; border-bottom: 3px solid var(--black); padding-bottom: 0.5rem; }

@media (max-width: 800px) { .layout { grid-template-columns: 1fr; } .sidebar { display: none; } }
</style>
</head>
<body>

<div class="page-header">
  <div><h1>Grammar Reference 📐</h1></div>
  <div class="lang-tabs" id="ref-lang-tabs">
    <button class="lang-tab" data-lang="en" onclick="setLang('en')">🇬🇧 EN</button>
    <button class="lang-tab" data-lang="fr" onclick="setLang('fr')">🇫🇷 FR</button>
    <button class="lang-tab" data-lang="it" onclick="setLang('it')">🇮🇹 IT</button>
    <button class="lang-tab" data-lang="ru" onclick="setLang('ru')">🇷🇺 RU</button>
    <button class="lang-tab" data-lang="el" onclick="setLang('el')">🇬🇷 EL</button>
    <button class="lang-tab" data-lang="es" onclick="setLang('es')">🇪🇸 ES</button>
    <button class="lang-tab" data-lang="de" onclick="setLang('de')">🇩🇪 DE</button>
    <button class="lang-tab" data-lang="pt" onclick="setLang('pt')">🇵🇹 PT</button>
    <button class="lang-tab" data-lang="hy" onclick="setLang('hy')">🇦🇲 HY</button>
    <button class="lang-tab" data-lang="ka" onclick="setLang('ka')">🇬🇪 KA</button>
    <button class="lang-tab" data-lang="tt" onclick="setLang('tt')">🇷🇺 TT</button>
    <button class="lang-tab" data-lang="ba" onclick="setLang('ba')">🇷🇺 BA</button>
    <button class="lang-tab" data-lang="br" onclick="setLang('br')">🇫🇷 BR</button>
  </div>
</div>

<div class="layout">
<nav class="sidebar" id="sidebar"></nav>
<main class="main" id="main-content"></main>
</div>

<script>
const FAMILIES = {
    "en": "germanic/en",
    "fr": "romance/fr",
    "it": "romance/it",
    "ru": "slavic/ru",
    "el": "hellenic/el",
    "es": "romance/es",
    "de": "germanic/de",
    "pt": "romance/pt",
    "hy": "armenian/hy",
    "ka": "kartvelian/ka",
    "tt": "turkic/tt",
    "ba": "turkic/ba",
    "br": "celtic/br"
};

async function loadGrammarData(lang) {
  const family = FAMILIES[lang];
  if (!family) return;
  const levels = ["starter", "elementary", "intermediate", "upper-intermediate", "advanced", "proficiency"];
  const promises = levels.map(lv => {
    return new Promise((resolve) => {
      const s = document.createElement("script");
      s.src = `../js/data/${family}/${lv}/verbs.js`;
      s.onload = () => resolve();
      s.onerror = () => resolve(); // Resolve anyway to not block
      document.head.appendChild(s);
    });
  });
  await Promise.all(promises);
}

async function loadNounData(lang) {
  const family = FAMILIES[lang];
  if (!family) return;
  const levels = ["starter", "elementary", "intermediate", "upper-intermediate", "advanced", "proficiency"];
  const promises = levels.map(lv => {
    return new Promise((resolve) => {
      const s = document.createElement("script");
      s.src = `../js/data/${family}/${lv}/vocabulary.js`;
      s.onload = () => resolve();
      s.onerror = () => resolve();
      document.head.appendChild(s);
    });
  });
  await Promise.all(promises);
}

const TENSE_LABELS = {
    'present_simple': { en: 'Present Simple', fr: 'Présent', it: 'Presente', ru: 'Настоящее время', es: 'Presente', de: 'Präsens', el: 'Ενεστώτας', ka: 'აწმყო' },
    'past_simple': { en: 'Past Simple', fr: 'Passé Simple', it: 'Passato Remoto', ru: 'Прошедшее время', es: 'Pretérito Indefinido', de: 'Präteritum', el: 'Αόριστος', ka: 'წყვეტილი' },
    'imperfect': { en: 'Imperfect', fr: 'Imparfait', it: 'Imperfetto', es: 'Pretérito Imperfecto', el: 'Παρατατικός', ka: 'უსრული' },
    'future_simple': { en: 'Future Simple', fr: 'Futur Simple', it: 'Futuro Semplice', ru: 'Будущее время', es: 'Futuro Próximo', de: 'Futur I', el: 'Μέλλοντας', ka: 'მომავალი' },
    'conditional_present': { en: 'Conditional', fr: 'Conditionnel Présent', it: 'Condizionale Presente', es: 'Condicional', pt: 'Condicional' },
    'subjunctive_present': { en: 'Subjunctive', fr: 'Subjonctif Présent', it: 'Congiuntivo Presente', es: 'Subjuntivo', pt: 'Subjuntivo' },
    'passe_compose': { fr: 'Passé Composé' },
    'passato_prossimo': { it: 'Passato Prossimo' },
    'pret_perfecto': { es: 'Pretérito Perfecto' },
    'perfekt': { de: 'Perfekt' },
    'conditional': { ru: 'Условное наклонение', br: 'Doare-divizout' },
    'future_indefinite': { tt: 'Киләчәк заман', ba: 'Киләсәк заман' },
    'subjunctive_2': { de: 'Konjunktiv II' },
    'present_continuous': { en: 'Present Continuous' }
};

function getTenseLabel(tense, lang) {
    if (TENSE_LABELS[tense] && TENSE_LABELS[tense][lang]) return TENSE_LABELS[tense][lang];
    if (TENSE_LABELS[tense] && TENSE_LABELS[tense]['en']) return TENSE_LABELS[tense]['en'];
    return tense.replace(/_/g, ' ');
}

async function setLang(lang) {
  await loadGrammarData(lang);
  await loadNounData(lang);
  window.lang = lang;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === lang));

  const verbs = window.verbsData?.[lang] || [];
  const nouns = (window.vocabularyData?.[lang] || []).filter(v => v.form === 'noun');

  const vLevels = {};
  verbs.forEach(v => {
    const lv = v.level || 'starter';
    if (!vLevels[lv]) vLevels[lv] = [];
    vLevels[lv].push(v);
  });

  const nLevels = {};
  nouns.forEach(n => {
    const lv = n.level || 'starter';
    if (!nLevels[lv]) nLevels[lv] = [];
    nLevels[lv].push(n);
  });

  let sidebarHtml = "";
  Object.keys(vLevels).forEach(lv => {
      sidebarHtml += `
        <div class="sidebar-section">
          <div class="sidebar-label">Verbs: ${lv.toUpperCase()}</div>
          ${vLevels[lv].map(v => `<a class="sidebar-item" href="#verb-${v.word.replace(/\s+/g, '-')}" onclick="setActiveLink(this)">${v.word}</a>`).join('')}
        </div>`;
  });
  Object.keys(nLevels).forEach(lv => {
      sidebarHtml += `
        <div class="sidebar-section">
          <div class="sidebar-label">Nouns: ${lv.toUpperCase()}</div>
          ${nLevels[lv].map(n => `<a class="sidebar-item" href="#noun-${n.word.replace(/\s+/g, '-')}" onclick="setActiveLink(this)">${n.word}</a>`).join('')}
        </div>`;
  });
  document.getElementById('sidebar').innerHTML = sidebarHtml;

  let contentHtml = `<div class="section-title">Grammar Reference — ${lang.toUpperCase()}</div>`;

  contentHtml += `<h3>Verbs</h3>`;
  Object.keys(vLevels).forEach(lv => {
      contentHtml += `
        <div class="level-badge">${lv}</div>
        <div class="cards-grid">${vLevels[lv].map(v => renderVerbCard(v)).join('')}</div>`;
  });

  if (Object.keys(nLevels).length > 0) {
      contentHtml += `<hr style="margin: 3rem 0; border: 2px solid var(--black);">`;
      contentHtml += `<h3>Nouns & Articles</h3>`;
      Object.keys(nLevels).forEach(lv => {
          contentHtml += `
            <div class="level-badge">${lv}</div>
            <div class="cards-grid">${nLevels[lv].map(n => renderNounCard(n)).join('')}</div>`;
      });
  }

  document.getElementById('main-content').innerHTML = contentHtml;
}

function renderNounCard(n) {
  const config = GRAMMAR_CONFIG[window.lang]?.nouns;
  if (!config) return "";

  const cases = config.cases || ['nominative'];
  const numbers = config.numbers || ['singular', 'plural'];
  const artTypes = config.article_types || ['definite', 'indefinite'];

  let tables = "";
  numbers.forEach(num => {
      tables += `
        <div class="tense-container" style="margin-bottom: 1rem;">
          <div class="tense-header">${num.toUpperCase()}</div>
          <table class="gtable">
            <tr><th class="row-label">Case</th><th>Article</th><th>Noun</th></tr>
            ${cases.map(c => {
                const inflected = Linguistics.inflectNoun(window.lang, n, num, c);
                const arts = artTypes.map(at => Linguistics.getArticle(window.lang, n, at, c, num)).filter(a => a).join(' / ');
                return `
                  <tr>
                    <td class="row-label">${c}</td>
                    <td><span class="key-neg">${arts || "-"}</span></td>
                    <td><span class="key-verb">${inflected}</span></td>
                  </tr>`;
            }).join('')}
          </table>
        </div>`;
  });

  // Possessive Suffixes (Turkic)
  if (config.possession) {
      const persons = ['1s', '2s', '3s'];
      tables += `
        <div class="tense-container" style="grid-column: 1 / -1; margin-top: 1rem;">
          <div class="tense-header">POSSESSION (SINGULAR)</div>
          <table class="gtable">
            <tr>${persons.map(p => `<th>${p}</th>`).join('')}</tr>
            <tr>
              ${persons.map(p => `<td><span class="key-verb">${Linguistics.applyPossession(window.lang, n, p, 'singular')}</span></td>`).join('')}
            </tr>
          </table>
        </div>`;
  }

  return `<div class="card" id="noun-${n.word.replace(/\s+/g, '-')}">
    <div class="card-title" style="background: var(--teal-dk);">${n.word.toUpperCase()}</div>
    <div class="card-meta">
        <span class="meta-badge">${n.gender || "neutral"}</span>
        ${n.countability ? `<span class="meta-badge">${n.countability}</span>` : ""}
    </div>
    <div class="tense-grid" style="grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));">${tables}</div>
  </div>`;
}

function renderVerbCard(v) {
  const config = GRAMMAR_CONFIG[window.lang];
  if (!config) return "";
  const tenses = Object.keys(config.verbs.regular_rules).concat(Object.keys(config.verbs.compound_tenses || {}));

  const tables = tenses.map(t => {
    const conj = Linguistics.conjugate(window.lang, v, t);
    if (!conj) return "";
    return `
      <div class="tense-container">
        <div class="tense-header">${getTenseLabel(t, window.lang)}</div>
        <table class="gtable">
          ${config.pronouns.map((p, i) => `
            <tr>
              <td class="row-label">${p}</td>
              <td><span class="key-verb">${conj.positive[i] || "-"}</span></td>
              <td><span class="key-neg">${conj.negative[i] || "-"}</span></td>
            </tr>
          `).join('')}
        </table>
      </div>`;
  }).join('');

  return `<div class="card" id="verb-${v.word.replace(/\s+/g, '-')}">
    <div class="card-title">${v.word.toUpperCase()}</div>
    <div class="card-meta">
        <span class="meta-badge">${v.classification}</span>
        <span class="meta-badge group">Group: ${v.group}</span>
        ${v.auxiliary ? `<span class="meta-badge aux">Aux: ${v.auxiliary}</span>` : ""}
    </div>
    <div class="tense-grid">${tables}</div>
  </div>`;
}

function setActiveLink(el) {
  document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
  el.classList.add('active');
}

document.addEventListener('DOMContentLoaded', () => {
  const urlParams = new URLSearchParams(window.location.search);
  setLang(urlParams.get('lang') || 'fr');
});
</script>
</body>
</html>
