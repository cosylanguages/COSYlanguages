<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Vocabulary — COSYlanguages</title>
    <link rel="icon" href="../../images/logos/cosylanguages.png">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital,wght@0,500;0,700;1,500;1,700&family=Fraunces:wght@600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../../css/tokens.css">
    <link rel="stylesheet" href="../../css/base.css">
    <link rel="stylesheet" href="../../css/components.css">
    <link rel="stylesheet" href="../../css/portal.css">

    <style>
        .vocab-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .vocab-card {
            background: #fff;
            border: 1.5px solid var(--border);
            border-radius: 20px;
            padding: 1.5rem;
            transition: all 0.2s ease;
            position: relative;
            display: flex;
            flex-direction: column;
        }
        .vocab-card:hover {
            box-shadow: var(--shadow-sm);
            border-color: var(--cosy-green);
        }
        .vocab-word {
            font-family: 'Fraunces', serif;
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--cosy-green-dark);
            margin-bottom: 0.5rem;
        }
        .vocab-def {
            font-size: 0.95rem;
            line-height: 1.5;
            color: #444;
            margin-bottom: 1rem;
        }
        .vocab-details {
            display: none;
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            animation: fadeIn 0.3s ease;
        }
        .vocab-card.expanded .vocab-details {
            display: block;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-5px); } to { opacity: 1; transform: translateY(0); } }

        .vocab-label {
            font-size: 0.65rem;
            font-weight: 900;
            text-transform: uppercase;
            color: #888;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .vocab-ex {
            background: #f9f9f9;
            padding: 10px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-style: italic;
            margin-bottom: 1rem;
            border-left: 3px solid var(--cosy-green);
        }
        .vocab-rel-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }
        .vocab-rel-item {
            font-size: 0.85rem;
            color: #555;
        }
        .vocab-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 1.5rem;
        }
        .btn-expand {
            background: none;
            border: none;
            color: var(--cosy-green);
            font-weight: 800;
            font-size: 0.75rem;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .btn-remove {
            color: #c0392b;
            font-size: 1.1rem;
            cursor: pointer;
            background: none;
            border: none;
        }
        .vocab-header-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            background: #fff;
            border-radius: 20px;
            border: 1.5px dashed var(--border);
            grid-column: 1 / -1;
        }
    </style>
</head>
<body class="mode-student">

    <nav id="cosy-nav"></nav>

    <div id="area" style="display: flex;">
        <aside class="sidebar">
            <div class="profile-card">
                <div style="font-size: 1.5rem; margin-bottom: 5px;">📓</div>
                <div style="font-weight: 900; font-size: 1.1rem;">Vocab Master</div>
                <div style="font-size: 0.65rem; opacity: 0.8; margin-top: 3px; font-weight: 700;">Personal Collection</div>
                <div class="stats-mini">
                    <div class="stat-mini-item">
                        <span id="vocab-count" class="stat-mini-val">0</span>
                        <span class="stat-mini-lbl">Words</span>
                    </div>
                </div>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item"><span>🗺️</span> Roadmap</a>
                <a href="vocabulary.html" class="nav-item active"><span>📓</span> Vocabulary</a>
                <a href="index.html?tab=homework" class="nav-item"><span>📝</span> Homework</a>
            </nav>
            <div style="margin-top: auto; padding-top: 1rem; border-top: 1px solid #eee;">
                <button onclick="COSY.logout()" style="width: 100%; background: #f5f5f5; border: none; padding: 0.8rem; border-radius: 10px; font-weight: 800; cursor: pointer; margin-top: 10px; color: #888;">Sign Out</button>
            </div>
        </aside>

        <main class="content">
            <div class="vocab-header-row">
                <div>
                    <h1 style="font-family: 'Fraunces', serif;">My Personal Vocabulary</h1>
                    <p style="color: #666;">Expanding your linguistic horizons, one word at a time.</p>
                </div>
                <button class="btn-primary-new" onclick="COSY.exportDict()">Export Data 📥</button>
            </div>

            <div id="vocab-container" class="vocab-grid">
                <!-- Loaded via JS -->
            </div>
        </main>
    </div>

    <script src="../../js/data/languages.js"></script>
    <script src="../../js/core/engine.js"></script>
    <script src="../../js/core/i18n.js"></script>
    <script src="../../js/core/ui.js"></script>
    <script src="../../js/data/pricing.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderVocabulary();
            // Listen for changes
            document.addEventListener('cosyModeChanged', renderVocabulary);
        });

        function renderVocabulary() {
            const container = document.getElementById('vocab-container');
            const countEl = document.getElementById('vocab-count');
            if (!container) return;

            const vocab = window.COSY.dictionary;
            const entries = Object.entries(vocab).sort((a, b) => (b[1].addedAt || 0) - (a[1].addedAt || 0));

            if (countEl) countEl.textContent = entries.length;

            if (entries.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 3rem; margin-bottom: 1rem;">🌱</div>
                        <h3>Your vocabulary is empty</h3>
                        <p>Words you save from lessons and games will appear here.</p>
                        <a href="index.html" class="btn-primary-new" style="display: inline-block; margin-top: 1rem; text-decoration: none;">Explore Roadmap</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = entries.map(([word, data]) => {
                const def = typeof data === 'string' ? data : (data.definition || '');
                const ex = data.example || '';
                const syns = data.synonyms || [];
                const ants = data.antonyms || [];
                const id = btoa(word).replace(/=/g, '');

                return `
                    <div class="vocab-card" id="card-${id}">
                        <button class="btn-remove" style="position: absolute; top: 1rem; right: 1rem;" onclick="removeWord('${word.replace(/'/g,"\\'")}')" title="Remove">✕</button>
                        <div class="vocab-word">${word}</div>
                        <div class="vocab-def">${def || '<em>No definition saved</em>'}</div>

                        <div class="vocab-details">
                            ${ex ? `
                                <div class="vocab-label">Example</div>
                                <div class="vocab-ex">"${ex}"</div>
                            ` : ''}

                            <div class="vocab-rel-grid">
                                ${syns.length > 0 ? `
                                    <div class="vocab-rel-item">
                                        <div class="vocab-label">Synonyms</div>
                                        <div>${syns.join(', ')}</div>
                                    </div>
                                ` : ''}
                                ${ants.length > 0 ? `
                                    <div class="vocab-rel-item">
                                        <div class="vocab-label">Antonyms</div>
                                        <div>${ants.join(', ')}</div>
                                    </div>
                                ` : ''}
                            </div>
                        </div>

                        <div class="vocab-actions">
                            <button class="btn-expand" onclick="toggleExpand('${id}')">
                                <span class="expand-label">Show Details</span> ▾
                            </button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function toggleExpand(id) {
            const card = document.getElementById('card-' + id);
            if (!card) return;
            const isExpanded = card.classList.toggle('expanded');
            const label = card.querySelector('.expand-label');
            const arrow = card.querySelector('.btn-expand');
            if (label) label.textContent = isExpanded ? 'Hide Details' : 'Show Details';
            if (arrow) arrow.innerHTML = isExpanded ? '<span class="expand-label">Hide Details</span> ▴' : '<span class="expand-label">Show Details</span> ▾';
        }

        function removeWord(word) {
            if (confirm(`Remove "${word}" from your vocabulary?`)) {
                window.COSY.removeFromDict(word);
                renderVocabulary();
            }
        }
    </script>
</body>
</html>
