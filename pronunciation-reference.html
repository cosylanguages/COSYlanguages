<!DOCTYPE html>
<html lang="en">
<head>
<script>if(localStorage.getItem("student_unlocked")!=="true")window.location.href="days.html";</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pronunciation Engine — COSYlanguages</title>
<link rel="icon" href="images/cosylanguages.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Lora:ital,wght@0,600;0,700;1,600&display=swap" rel="stylesheet">
<script src="js/data/curriculum_data.js"></script>
<script src="js/games/utils/shared.js"></script>
<style>
/* ══════════════════════════════════════════
   DESIGN TOKENS & THEMES
══════════════════════════════════════════ */
:root {
  --teal:    #00B5A3;
  --teal-dk: #008F80;
  --teal-lt: #00CFC0;
  --black:   #111111;
  --white:   #FFFFFF;
  --yellow:  #FFE135;
  --red:     #FF4136;
  --orange:  #FF6B1A;
  --green:   #2ECC40;
  --blue:    #0074D9;
  --cream:   #FFFDF5;
  --sky:     #3B82F6;
  --sky-lt:  #DBEAFE;

  /* theme defaults (Earth) */
  --bg: var(--teal);
  --sidebar-bg: var(--teal-dk);
  --card-bg: var(--teal);
  --text: var(--black);
  --header-bg: var(--black);
  --header-text: var(--white);
  --border: var(--black);
  --shadow: var(--black);
}

body.theme-paper {
  --bg: #F4F1EA;
  --sidebar-bg: #E8E4D8;
  --card-bg: #FFFFFF;
  --text: #2C2C2C;
  --header-bg: #2C2C2C;
  --header-text: #F4F1EA;
  --border: #4A4A4A;
  --shadow: rgba(0,0,0,0.1);
}

body.theme-contrast {
  --bg: #000000;
  --sidebar-bg: #1A1A1A;
  --card-bg: #1A1A1A;
  --text: #FFFFFF;
  --header-bg: #FFFFFF;
  --header-text: #000000;
  --border: #FFFFFF;
  --shadow: transparent;
  --teal: #00FFCC;
  --yellow: #FFFF00;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: all 0.3s ease; }

/* ── Header ── */
.page-header {
  background: var(--header-bg); color: var(--header-text);
  padding: 1rem 2rem; display: flex; align-items: center;
  justify-content: space-between; flex-wrap: wrap; gap: .8rem;
  position: sticky; top: 0; z-index: 300;
  border-bottom: 3px solid var(--yellow);
}
.page-header h1 { font-family: 'Lora', serif; font-size: 1.3rem; font-weight: 700; letter-spacing: .02em; }
.breadcrumb { font-size: .78rem; opacity: .6; }
.lang-tabs { display: flex; gap: .4rem; flex-wrap: wrap; }
.lang-tab {
  background: rgba(255,255,255,.12); border: 2px solid rgba(255,255,255,.25);
  border-radius: 999px; color: #fff; font-family: 'Nunito', sans-serif;
  font-size: .78rem; font-weight: 800; padding: .25rem .75rem;
  cursor: pointer; transition: all .18s;
}
.lang-tab.active { background: var(--teal); border-color: var(--teal); color: var(--black); }
.lang-tab:hover  { background: var(--teal-lt); border-color: var(--teal-lt); }

/* ── Layout ── */
.layout { display: grid; grid-template-columns: 250px 1fr; min-height: calc(100vh - 64px); }

/* ── Sidebar ── */
.sidebar {
  background: var(--sidebar-bg); padding: 1.5rem 0;
  border-right: 3px solid var(--border);
  position: sticky; top: 67px; height: calc(100vh - 67px); overflow-y: auto;
}
.sidebar-section { margin-bottom: .3rem; }
.sidebar-label {
  font-size: .62rem; font-weight: 900; letter-spacing: .1em; text-transform: uppercase;
  color: var(--text); opacity: 0.5; padding: .8rem 1.2rem .3rem;
}
.sidebar-item {
  display: block; padding: .5rem 1.2rem; font-size: .82rem; font-weight: 700;
  color: var(--text); cursor: pointer; border-left: 3px solid transparent;
  transition: all .15s; text-decoration: none;
}
.sidebar-item:hover { background: rgba(0,0,0,.05); color: var(--text); }
.sidebar-item.active { border-left-color: var(--yellow); background: rgba(0,0,0,.1); font-weight: 900; }

/* ── Main ── */
.main { padding: 2rem; background: var(--bg); max-width: 900px; margin: 0 auto; }

/* Section title */
.section-title {
  font-family: 'Lora', serif; font-size: 1.8rem; font-weight: 700;
  color: var(--text); margin-bottom: 1.2rem; padding-bottom: .5rem;
  border-bottom: 3px solid var(--border); display: flex; align-items: center; gap: .7rem; flex-wrap: wrap;
}

/* ── Card ── */
.card {
  background: var(--card-bg); border: 3px solid var(--border); border-radius: 12px;
  margin-bottom: 2rem; overflow: hidden; box-shadow: 6px 6px 0 var(--border);
  transition: transform 0.2s ease;
}
.card:hover { transform: translateY(-2px); }

.card-title {
  background: var(--border); color: var(--white); font-family: 'Lora', serif;
  font-size: 1.1rem; font-weight: 700; padding: .8rem 1.2rem;
  display: flex; align-items: center; gap: .8rem;
}
.card-body { padding: 1.5rem; }

/* Grammar table style tables */
.gtable { width: 100%; border-collapse: collapse; margin-bottom: 1rem; }
.gtable td, .gtable th { border: 2px solid var(--border); padding: .7rem 1rem; font-size: .92rem; font-weight: 700; vertical-align: middle; line-height: 1.4; }
.gtable th { background: rgba(0,0,0,0.05); text-align: left; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; }

/* Phonetic-specific helpers */
.ipa  { font-family: 'Lora', serif; font-style: italic; color: var(--blue); font-weight: 700; }
.ex   { color: var(--orange); font-weight: 800; cursor: pointer; }
.ex:hover { text-decoration: underline; }
.hi   { background: rgba(255,225,53,.3); border-radius: 3px; padding: 0 .2rem; }

/* Tip box & Extension */
.extension-box {
  background: var(--sky-lt); border-left: 5px solid var(--sky);
  padding: 1rem; margin-top: 1rem; font-size: .88rem; font-weight: 700;
  color: var(--sky); border-radius: 0 8px 8px 0;
}
.tip-box {
  background: #FFFBEB; border: 2px dashed var(--orange);
  padding: 0.8rem; margin: 1rem 0; font-size: 0.85rem; border-radius: 8px; color: var(--orange);
}

/* Alphabet grid */
.alpha-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(70px,1fr)); gap: .6rem; margin-bottom: 1rem;
}
.alpha-cell {
  border: 2px solid var(--border); border-radius: 8px; background: var(--white);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: .6rem; text-align: center; cursor: pointer; transition: all 0.2s;
  color: var(--black);
}
.alpha-cell:hover { background: var(--yellow); transform: scale(1.05); }
.alpha-cell .letter { font-size: 1.4rem; font-weight: 900; }
.alpha-cell .ipa-sm  { font-family: 'Lora', serif; font-style: italic; font-size: .7rem; color: var(--blue); }

/* Practice button */
.btn-practice {
  display: inline-flex; align-items: center; gap: 0.5rem;
  background: var(--yellow); color: var(--black); border: 2px solid var(--border);
  padding: 0.5rem 1rem; border-radius: 999px; font-weight: 800; font-size: 0.85rem;
  cursor: pointer; text-decoration: none; margin-top: 0.5rem;
}
.btn-practice:hover { background: var(--white); }

@media (max-width: 820px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { display: none; }
}
</style>
</head>
<body>

<div class="page-header">
  <div>
    <a href="days.html" style="text-decoration: none; color: inherit;"><div class="breadcrumb">Student Area 🔑</div></a>
    <h1>Pronunciation Reference 🔊</h1>
  </div>
  <div class="lang-tabs" id="lang-tabs">
    <!-- Buttons filled from curriculum_data.js -->
  </div>
</div>

<div class="layout">
  <nav class="sidebar" id="sidebar"></nav>
  <main class="main" id="main-content">
    <div id="engine-status" style="text-align:center; padding: 3rem; font-weight: 800; opacity: 0.5;">
      Loading Pronunciation Engine...
    </div>
  </main>
</div>

<script>
let currentLang = 'en';
let currentCurriculum = [];

function init() {
  const savedTheme = localStorage.getItem('cosy_dashboard_theme') || 'earth';
  document.body.className = 'theme-' + savedTheme;

  const code = localStorage.getItem('student_course_code');
  let startLang = 'en';

  if (code && typeof COURSES !== 'undefined' && COURSES[code]) {
    startLang = COURSES[code].lang.toLowerCase();
    document.getElementById('lang-tabs').style.display = 'none';
  }

  // Build tabs if visible
  const tabCont = document.getElementById('lang-tabs');
  if (tabCont.style.display !== 'none') {
    Object.entries(LANGS).forEach(([id, info]) => {
      const btn = document.createElement('button');
      btn.className = 'lang-tab' + (id.toLowerCase() === startLang ? ' active' : '');
      btn.textContent = `${info.flag} ${id}`;
      btn.onclick = () => setLang(id.toLowerCase());
      btn.dataset.lang = id.toLowerCase();
      tabCont.appendChild(btn);
    });
  }

  setLang(startLang);
}

async function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-tab').forEach(t => t.classList.toggle('active', t.dataset.lang === lang));

  const status = document.getElementById('engine-status');
  if (status) status.style.display = 'block';

  try {
    await loadData(lang);
    renderContent();
  } catch (e) {
    console.error('Error in setLang:', e);
  }
}

async function loadData(lang) {
  const dataKey = `${lang.toLowerCase()}_a1`;
  const path = `js/data/curriculum/${dataKey}.js`;

  return new Promise((resolve) => {
    const script = document.createElement('script');
    script.src = path;
    script.onload = () => {
      if (window.curriculumData && window.curriculumData[dataKey]) {
        currentCurriculum = window.curriculumData[dataKey];
      }
      resolve();
    };
    script.onerror = () => {
      console.warn(`Curriculum not found for ${dataKey}`);
      currentCurriculum = [];
      resolve();
    };
    document.head.appendChild(script);
  });
}

function renderContent() {
  const main = document.getElementById('main-content');
  const sidebar = document.getElementById('sidebar');

  let allPoints = [];
  currentCurriculum.forEach(unit => {
    (unit.lessons || []).forEach(lesson => {
      if (lesson.pronunciation) {
        lesson.pronunciation.forEach(p => {
          allPoints.push({ ...p, lessonTitle: lesson.title });
        });
      }
    });
  });

  if (allPoints.length === 0) {
    main.innerHTML = `<div class="section-title">${LANGS[currentLang.toUpperCase()]?.label || currentLang} Pronunciation</div>
                      <p style="text-align:center; padding: 2rem;">No pronunciation data found for this level yet.</p>`;
    sidebar.innerHTML = "";
    return;
  }

  // Render Sidebar
  sidebar.innerHTML = `<div class="sidebar-section">
    <div class="sidebar-label">A1 Topics</div>
    ${allPoints.map((p, i) => `
      <a class="sidebar-item" href="#point-${i}" id="side-item-${i}" onclick="scrollToPoint(event, ${i})">${p.point}</a>
    `).join('')}
  </div>`;

  // Render Main
  main.innerHTML = `<div class="section-title">${LANGS[currentLang.toUpperCase()]?.label} — A1 Pronunciation</div>`;

  allPoints.forEach((p, i) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.id = `point-${i}`;

    let html = `
      <div class="card-title">${p.visual || '🔊'} ${p.point}</div>
      <div class="card-body">
        <p style="margin-bottom: 1rem; line-height: 1.5;">${p.explain}</p>
        ${p.image ? `<img src="${p.image}" alt="${p.point}" style="max-width:100%; border-radius:12px; margin-bottom:1rem; border:2px solid var(--border);">` : ''}
    `;

    if (p.alphabet) {
      html += `<div class="alpha-grid">
        ${p.alphabet.map(a => `
          <div class="alpha-cell" onclick="speakPhonetic('${a.l.replace(/'/g, "\\'")}')">
            <div class="letter">${a.l}</div>
            <div class="ipa-sm">${a.ipa}</div>
          </div>
        `).join('')}
      </div>`;
    }

    if (p.minimalPairs) {
      html += `<table class="gtable">
        <thead><tr><th>Word 1</th><th>IPA</th><th>Word 2</th><th>IPA</th></tr></thead>
        <tbody>
          ${p.minimalPairs.map(mp => `
            <tr>
              <td class="ex" onclick="speakPhonetic('${mp.w1.replace(/'/g, "\\'")}')">${mp.w1}</td>
              <td class="ipa">${mp.p1}</td>
              <td class="ex" onclick="speakPhonetic('${mp.w2.replace(/'/g, "\\'")}')">${mp.w2}</td>
              <td class="ipa">${mp.p2}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
    }

    if (p.examples) {
      html += `<table class="gtable">
        <thead><tr><th>Pattern</th><th>IPA</th><th>Example</th></tr></thead>
        <tbody>
          ${p.examples.map(ex => `
            <tr>
              <td><strong>${ex.pattern}</strong></td>
              <td class="ipa">${ex.ipa}</td>
              <td class="ex" onclick="speakPhonetic('${ex.word.replace(/'/g, "\\'")}')">${ex.word}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>`;
    }

    if (p.tip) {
      html += `<div class="tip-box">💡 <strong>Tip:</strong> ${p.tip}</div>`;
    }

    if (p.extension) {
      html += `<div class="extension-box">${p.extension}</div>`;
    }

    html += `
        <div style="margin-top: 1.5rem; display: flex; justify-content: flex-end;">
          <a href="practice.html?lang=${currentLang}&cat=pronunciation&theme=${encodeURIComponent(p.point)}" class="btn-practice">
            🎯 Practice these sounds
          </a>
        </div>
      </div>
    `;

    card.innerHTML = html;
    main.appendChild(card);
  });

  initScrollSpy();
}

function speakPhonetic(text) {
  if (window.gameUtils && window.gameUtils.speak) {
    window.gameUtils.speak(text, currentLang, 0.7);
  } else if (window.speechSynthesis) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = currentLang;
    utterance.rate = 0.7;
    window.speechSynthesis.speak(utterance);
  }
}

function scrollToPoint(e, i) {
  if (e) e.preventDefault();
  const el = document.getElementById(`point-${i}`);
  if (el) {
    const offset = 80;
    const bodyRect = document.body.getBoundingClientRect().top;
    const elementRect = el.getBoundingClientRect().top;
    const elementPosition = elementRect - bodyRect;
    const offsetPosition = elementPosition - offset;

    window.scrollTo({
      top: offsetPosition,
      behavior: 'smooth'
    });
  }
}

function initScrollSpy() {
  const options = { rootMargin: '-100px 0px -70% 0px', threshold: 0 };
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        document.querySelectorAll('.sidebar-item').forEach(i => i.classList.remove('active'));
        const id = entry.target.id.split('-')[1];
        const item = document.getElementById(`side-item-${id}`);
        if (item) item.classList.add('active');
      }
    });
  }, options);

  document.querySelectorAll('.card').forEach(card => observer.observe(card));
}

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
